```html
<!DOCTYPE html>
<html>

<head>
<title>Aetherfall Market</title>

<style>

/* BASE */

body{
margin:0;
font-family:Arial;
color:white;
cursor:none;
overflow:hidden;

background:linear-gradient(
-45deg,
#020617,
#0f172a,
#1e1b4b,
#3b0764
);

background-size:400% 400%;
animation:skyShift 20s ease infinite;
}

@keyframes skyShift{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* STARS */

.stars{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;

background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(#38bdf8 1px, transparent 1px),
radial-gradient(#9333ea 1px, transparent 1px);

background-size:120px 120px,200px 200px,260px 260px;

opacity:0.35;

animation:starMove 100s linear infinite;
z-index:0;
}

@keyframes starMove{
from{transform:translateY(0);}
to{transform:translateY(-1000px);}
}

/* CENTER CONTENT */

.center{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
z-index:2;
}

.logo{
font-size:95px;
letter-spacing:6px;

background:linear-gradient(
90deg,
#38bdf8,
#6366f1,
#9333ea
);

-webkit-background-clip:text;
color:transparent;

text-shadow:
0 0 25px rgba(56,189,248,0.5),
0 0 50px rgba(147,51,234,0.4);
}

.subtitle{
margin-top:10px;
opacity:0.8;
font-size:20px;
letter-spacing:3px;
}

/* ENTER BUTTON */

.enterBtn{
margin-top:50px;
padding:16px 60px;
font-size:18px;
border-radius:12px;
background:#0f172a;
border:1px solid #38bdf8;
color:white;
text-decoration:none;
transition:0.35s;
box-shadow:0 0 15px rgba(56,189,248,0.35);
}

.enterBtn:hover{
transform:scale(1.15);
box-shadow:
0 0 25px #38bdf8,
0 0 50px #6366f1;
}

/* CUSTOM CURSOR */

.cursor{

position:fixed;

width:28px;
height:40px;

pointer-events:none;

z-index:9999;

transform:translate(-50%,-50%);

}

/* BLADE SHAPE */

.cursor-blade{

width:100%;
height:100%;

clip-path:polygon(
50% 0%,
90% 40%,
60% 100%,
40% 100%,
10% 40%
);

background:linear-gradient(
180deg,
#38bdf8,
#6366f1,
#9333ea
);

box-shadow:
0 0 10px #38bdf8,
0 0 15px #9333ea;

}

/* FLAME EFFECT */

.cursor-flame{

position:absolute;

top:-8px;
left:50%;

width:8px;
height:14px;

transform:translateX(-50%);

background:linear-gradient(
180deg,
#38bdf8,
#9333ea,
transparent
);

opacity:0;

filter:blur(1px);

}

/* FLAME ANIMATION */

@keyframes flameBurst{

0%{
opacity:1;
transform:translateX(-50%) scaleY(0.5);
}

50%{
opacity:1;
transform:translateX(-50%) scaleY(1.4);
}

100%{
opacity:0;
transform:translateX(-50%) scaleY(0.3);
}

}

</style>

</head>

<body>

<div class="stars"></div>

<div class="center">

<h1 class="logo">AETHERFALL</h1>

<div class="subtitle">MARKETPLACE</div>

<a href="market.html" class="enterBtn">ENTER</a>

</div>

<!-- CURSOR -->

<div class="cursor" id="cursor">

<div class="cursor-blade"></div>
<div class="cursor-flame" id="flame"></div>

</div>

<script>

/* CURSOR FOLLOW */

const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e => {

cursor.style.left = e.clientX + "px";
cursor.style.top = e.clientY + "px";

});

/* RANDOM FLAME BURST */

const flame = document.getElementById("flame");

function triggerFlame(){

flame.style.animation = "none";
flame.offsetHeight;

flame.style.animation = "flameBurst 0.4s ease";

}

function randomFlame(){

triggerFlame();

let next = 5000 + Math.random()*5000;

setTimeout(randomFlame,next);

}

randomFlame();

</script>

</body>

</html>
```
