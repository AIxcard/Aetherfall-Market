<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aetherfall | Requiem Event</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #c084fc; --bg: #020205; --panel: rgba(13, 13, 25, 0.98);
            --lane0: #ff00ff; --lane1: #00ffff; --lane2: #ffff00; --lane3: #00ff00; --lane4: #ff4400;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; overflow: hidden; touch-action: none; }

        /* --- HUB LAYOUT --- */
        #event-hub { display: flex; width: 100%; height: 100%; padding: 40px; position: relative; }
        .sidebar { width: 320px; display: flex; flex-direction: column; gap: 20px; z-index: 10; }
        .event-card {
            background: rgba(88, 28, 135, 0.2); padding: 20px; display: flex; align-items: center; gap: 15px; 
            cursor: pointer; border: 2px solid var(--accent); box-shadow: 0 0 15px rgba(192, 132, 252, 0.4);
            clip-path: polygon(5% 0, 100% 0, 100% 75%, 95% 100%, 0 100%, 0 25%);
        }

        .main-panel { flex: 1; display: flex; justify-content: center; align-items: flex-start; padding-top: 20px; }
        .details-box { background: var(--panel); border: 1px solid #333; padding: 40px; width: 100%; max-width: 700px; border-radius: 12px; }

        .bar-bg { width: 100%; height: 12px; background: #111; border-radius: 6px; margin: 15px 0; border: 1px solid #333; }
        #prog-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #c084fc, #6366f1); transition: 1s ease; }
        
        .btn-row { display: flex; gap: 15px; margin-top: 30px; }
        .av-btn { flex: 1; border: none; padding: 18px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; border-radius: 4px; font-size: 16px; transition: 0.2s; color: white; }
        .av-btn:hover { transform: translateY(-3px); filter: brightness(1.2); }

        .bottom-controls { position: fixed; bottom: 30px; left: 30px; display: flex; flex-direction: column; gap: 12px; z-index: 100; }
        .ctrl-btn { background: #1a1a2e; border: 1px solid #444; color: #888; padding: 10px 20px; cursor: pointer; font-family: 'Orbitron'; font-size: 11px; border-radius: 4px; width: 160px; text-transform: uppercase;}

        /* --- MODALS --- */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #0a0a0f; border: 2px solid #333; padding: 40px; width: 90%; max-width: 900px; min-height: 600px; border-radius: 12px; position: relative; overflow-y: auto; }
        
        .play-list { display: flex; flex-direction: column; gap: 15px; margin-top: 25px; }
        .diff-row { 
            background: #111; border: 1px solid #333; padding: 25px; border-radius: 8px; 
            display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.3s;
        }
        .diff-row:hover { border-color: var(--accent); background: #1a1a25; }

        .shop-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 25px; }
        .shop-item { background: linear-gradient(145deg, #151520, #0a0a0f); border: 1px solid #444; padding: 25px; border-radius: 15px; text-align: center; border-bottom: 4px solid var(--accent); transition: 0.3s; }
        .shop-item:hover { border-color: white; transform: scale(1.02); }

        .mission-list-container { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .mission-row { background: #111; padding: 25px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid var(--accent); box-shadow: 4px 4px 10px rgba(0,0,0,0.3); }

        /* --- RHYTHM ENGINE (MOBILE OPTIMIZED) --- */
        #game-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 3000; }
        
        /* Full Screen Lane Visuals */
        .highway { 
            position: absolute; left: 50%; transform: translateX(-50%); 
            width: 600px; max-width: 100vw; height: 100%; 
            background: rgba(5, 5, 8, 0.9); border-inline: 2px solid #222; 
        }

        /* MOBILE TOUCH SECTIONS (5 Lanes across entire Highway) */
        #mobile-touch-container { 
            display: none; position: absolute; inset: 0; 
            width: 100%; height: 100%; z-index: 4000; 
        }
        .touch-lane { 
            flex: 1; height: 100%; position: relative; 
            border-inline: 1px solid rgba(255,255,255,0.05);
            transition: background 0.1s;
        }
        /* Color Indicators for Lanes */
        .lane-0:active { background: linear-gradient(to top, rgba(255,0,255,0.3), transparent); }
        .lane-1:active { background: linear-gradient(to top, rgba(0,255,255,0.3), transparent); }
        .lane-2:active { background: linear-gradient(to top, rgba(255,255,0,0.3), transparent); }
        .lane-3:active { background: linear-gradient(to top, rgba(0,255,0,0.3), transparent); }
        .lane-4:active { background: linear-gradient(to top, rgba(255,68,0,0.3), transparent); }

        .note { 
            position: absolute; width: 75px; height: 75px; border-radius: 50%; 
            transform: translateX(-50%); border: 5px solid #fff; 
            box-shadow: 0 0 30px currentColor;
            background: radial-gradient(circle, #fff 0%, currentColor 70%);
            pointer-events: none; z-index: 3010;
        }

        /* JUDGEMENT LINE AT THE VERY BOTTOM */
        .judgement-line { 
            position: absolute; bottom: 0; width: 100%; height: 120px; 
            border-top: 6px solid var(--accent); 
            background: linear-gradient(to top, rgba(192, 132, 252, 0.2), transparent); 
            display: flex; justify-content: space-around; align-items: center; 
            z-index: 3005; padding-bottom: env(safe-area-inset-bottom);
        }
        .key-hint-box { 
            flex: 1; text-align: center; font-family: 'Orbitron'; 
            font-size: 28px; font-weight: 900; color: white; 
            text-shadow: 0 0 10px #000;
        }

        /* Lane color dots on judgement line */
        .lane-dot { width: 12px; height: 12px; border-radius: 50%; margin: 5px auto; }

        .score-ui { position: absolute; top: 10%; right: 5%; text-align: right; font-family: 'Orbitron'; pointer-events: none; z-index: 5000;}
        #combo-txt { font-size: 80px; color: var(--accent); font-weight: 900; line-height: 0.8; }
        #live-score { font-size: 32px; color: #fff; }

        #game-timer-display { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-family: 'Orbitron'; font-size: 30px; color: var(--accent); z-index: 4005; }

        .judgment-msg { 
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); 
            font-family: 'Orbitron'; font-weight: 900; font-size: 60px; 
            pointer-events: none; z-index: 5000; 
            animation: popFeedback 0.3s ease-out forwards; 
        }
        @keyframes popFeedback { 0% { opacity:1; transform: translate(-50%, 0) scale(0.8); } 100% { opacity:0; transform: translate(-50%, -100px) scale(1.2); } }

        @media (max-width: 600px) {
            .highway { width: 100%; }
            .note { width: 60px; height: 60px; }
            .judgement-line { height: 100px; }
            .score-ui { top: 70px; right: 20px; transform: scale(0.7); }
        }
    </style>
</head>
<body>

<div id="event-hub">
    <div class="sidebar">
        <h3 style="font-family:'Orbitron'; color: var(--accent);">CURRENT EVENTS</h3>
        <div id="reset-timer" style="font-size:12px; color:#666; font-family:'Orbitron';">RESETS IN: --:--:--</div>
        <div class="event-card">
            <span style="font-family:'Orbitron'; font-size: 24px; font-weight: 900;">1</span>
            <div><b>Requiem Trial</b><br><small style="color: #22c55e;">ACTIVE</small></div>
        </div>
    </div>

    <div class="main-panel">
        <div class="details-box">
            <h1 style="font-family:'Orbitron'; font-size: 42px; margin:0;">REQUIEM</h1>
            <p style="opacity: 0.7; font-size: 20px;">Master the rhythm at the absolute edge.</p>
            <div class="bar-bg"><div id="prog-fill"></div></div>
            <p style="font-size: 20px;">Antique Coins: <span id="coin-txt" style="color: gold; font-weight: bold;">0</span></p>
            <div class="btn-row">
                <button class="av-btn" style="background: #a855f7;" onclick="openModal('shop')">Shop</button>
                <button class="av-btn" style="background: #22c55e;" onclick="openModal('stage')">Play</button>
                <button class="av-btn" style="background: #eab308;" onclick="openModal('missions')">Missions</button>
            </div>
        </div>
    </div>

    <div class="bottom-controls">
        <button class="ctrl-btn" onclick="window.location.href='index.html'">← RETURN</button>
        <button class="ctrl-btn" onclick="openModal('settings')">⚙ SETTINGS</button>
    </div>
</div>

<div id="stage-modal" class="modal-overlay">
    <div class="modal-content">
        <h1 style="font-family:'Orbitron'; text-align:center;">SELECT DIFFICULTY</h1>
        <div class="play-list" id="diff-list"></div>
        <button class="av-btn" style="background:#222; margin-top:40px; width:100%" onclick="closeModals()">CLOSE</button>
    </div>
</div>

<div id="shop-modal" class="modal-overlay">
    <div class="modal-content">
        <h2 style="font-family:'Orbitron'; font-size: 32px; color:var(--accent); text-align:center; border-bottom: 1px solid #333; padding-bottom:10px;">EVENT SHOP</h2>
        <div class="shop-grid">
            <div class="shop-item">
                <div style="font-size: 40px; margin-bottom: 10px;">🎭</div>
                <h3 style="margin:5px 0;">Requiem [SKIN]</h3>
                <button class="av-btn" id="buy-skin" style="background:var(--accent)" onclick="buy('skin', 150)">150 ANTIQUE COINS</button>
            </div>
            <div class="shop-item">
                <div style="font-size: 40px; margin-bottom: 10px;">✨</div>
                <h3 style="margin:5px 0;">Hollow [VFX]</h3>
                <button class="av-btn" id="buy-vfx" style="background:var(--accent)" onclick="buy('vfx', 250)">250 ANTIQUE COINS</button>
            </div>
        </div>
        <button class="av-btn" style="background:#222; margin-top:30px; width:100%" onclick="closeModals()">CLOSE</button>
    </div>
</div>

<div id="missions-modal" class="modal-overlay">
    <div class="modal-content">
        <h2 style="font-family:'Orbitron'; font-size: 32px; text-align:center;">MISSIONS</h2>
        <div id="mission-list" class="mission-list-container"></div>
        <button class="av-btn" style="background:#222; margin-top:30px; width:100%" onclick="closeModals()">CLOSE</button>
    </div>
</div>

<div id="settings-modal" class="modal-overlay"><div class="modal-content" style="width:450px;"><h2 style="font-family:'Orbitron';">SETTINGS</h2><button id="mode-toggle" class="av-btn" style="background:var(--accent); margin-bottom:20px; width:100%" onclick="toggleInputMode()">PC MODE</button><div id="bind-editor"></div><button class="av-btn" style="background:#22c55e; margin-top:20px; width:100%" onclick="closeModals()">SAVE</button></div></div>

<div id="game-screen">
    <div id="game-timer-display">00:00</div>
    <div class="highway">
        <div id="note-layer"></div>
        <div id="mobile-touch-container">
            <div class="touch-lane lane-0" onpointerdown="handleHit(0)"></div>
            <div class="touch-lane lane-1" onpointerdown="handleHit(1)"></div>
            <div class="touch-lane lane-2" onpointerdown="handleHit(2)"></div>
            <div class="touch-lane lane-3" onpointerdown="handleHit(3)"></div>
            <div class="touch-lane lane-4" onpointerdown="handleHit(4)"></div>
        </div>
        <div class="judgement-line" id="key-hints"></div>
    </div>
    <div class="score-ui">
        <div id="live-score">000000</div>
        <div id="combo-txt">0</div>
        <div style="font-size:14px; opacity:0.5; letter-spacing: 2px;">COMBO</div>
    </div>
    <button style="position:fixed; top:20px; left:20px; z-index:6000; background:rgba(255,0,0,0.4); border:1px solid red; color:white; padding:8px 15px; cursor:pointer; font-family:'Orbitron'; border-radius:4px;" onclick="forceExit()">EXIT</button>
</div>

<script>
    let state = {
        coins: 0,
        keys: ['q', 'w', 'e', 'r', 't'],
        inputMode: 'pc',
        bought: [],
        bestScores: { easy: 0, medium: 0, hard: 0, expert: 0 },
        lastReset: 0,
        missions: [
            { id: 0, label: "Clear Easy Mode", req: 5000, diff: 'easy', reward: 20, status: 'none' },
            { id: 1, label: "Reach 15k on Medium", req: 15000, diff: 'medium', reward: 50, status: 'none' },
            { id: 2, label: "Master Hard Mode", req: 30000, diff: 'hard', reward: 100, status: 'none' },
            { id: 3, label: "Requiem Master (Expert)", req: 50000, diff: 'expert', reward: 250, status: 'none' }
        ]
    };

    const diffSettings = {
        easy: { rate: 900, time: 60, speed: 7 },
        medium: { rate: 700, time: 90, speed: 10 },
        hard: { rate: 500, time: 120, speed: 13 },
        expert: { rate: 400, time: 150, speed: 17 }
    };

    const laneColors = ['#ff00ff', '#00ffff', '#ffff00', '#00ff00', '#ff4400'];

    function save() { localStorage.setItem('Aetherfall_Requiem_Final_v1', JSON.stringify(state)); }
    function load() {
        let data = localStorage.getItem('Aetherfall_Requiem_Final_v1');
        if(data) state = JSON.parse(data);
        checkDailyReset();
        refreshUI();
    }

    function checkDailyReset() {
        const now = Date.now();
        if (now - state.lastReset > 86400000) {
            state.missions.forEach(m => m.status = (m.status === 'claimed' ? 'claimed' : 'none'));
            state.lastReset = new Date().setHours(0,0,0,0);
            save();
        }
    }

    setInterval(() => {
        const diff = (state.lastReset + 86400000) - Date.now();
        const h = Math.floor(diff/3600000).toString().padStart(2,'0');
        const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
        const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
        const timerEl = document.getElementById('reset-timer');
        if(timerEl) timerEl.innerText = `RESETS IN: ${h}:${m}:${s}`;
    }, 1000);

    function refreshUI() {
        document.getElementById('coin-txt').innerText = state.coins + "";
        let claimed = state.missions.filter(m => m.status === 'claimed').length;
        document.getElementById('prog-fill').style.width = (claimed / 4 * 100) + '%';
        state.bought.forEach(i => { if(document.getElementById('buy-'+i)) document.getElementById('buy-'+i).innerText = "OWNED"; });
    }

    function openModal(id) {
        if(id === 'stage') renderDiffs();
        if(id === 'settings') renderBinds();
        if(id === 'missions') renderMissions();
        document.getElementById(id + '-modal').style.display = 'flex';
    }
    function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); save(); }

    function renderDiffs() {
        document.getElementById('diff-list').innerHTML = ['easy', 'medium', 'hard', 'expert'].map(d => `
            <div class="diff-row" onclick="startRhythm('${d}')">
                <div>
                    <h3 style="text-transform:uppercase; margin:0; color:var(--accent); font-family:'Orbitron';">${d}</h3>
                    <small style="opacity:0.5;">BEST SCORE: ${state.bestScores[d]}</small>
                </div>
                <div style="font-family:'Orbitron'; font-weight:900; color:var(--accent);">SELECT →</div>
            </div>
        `).join('');
    }

    function renderMissions() {
        document.getElementById('mission-list').innerHTML = state.missions.map(m => {
            let btn = `<button class="av-btn" style="background:#222; max-width:120px;" disabled>LOCKED</button>`;
            if(m.status === 'ready') btn = `<button class="av-btn" style="background:var(--accent); max-width:120px;" onclick="claimMission(${m.id})">CLAIM</button>`;
            if(m.status === 'claimed') btn = `<button class="av-btn" style="background:#22c55e; max-width:120px;" disabled>DONE</button>`;
            return `<div class="mission-row"><div><b>${m.label}</b><br><small>${m.req} Score</small></div><div>${btn}</div></div>`;
        }).join('');
    }

    function claimMission(id) {
        let m = state.missions.find(x => x.id === id);
        if(m && m.status === 'ready') {
            m.status = 'claimed'; state.coins += m.reward; save(); refreshUI(); renderMissions();
        }
    }

    function renderBinds() {
        document.getElementById('bind-editor').innerHTML = state.keys.map((k, i) => `
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span>Lane ${i+1}</span>
                <input style="width:60px; text-align:center; background:#000; color:var(--accent); border:1px solid #444;" value="${k.toUpperCase()}" onchange="state.keys[${i}]=this.value.toLowerCase()">
            </div>
        `).join('');
    }

    function toggleInputMode() {
        state.inputMode = state.inputMode === 'pc' ? 'mobile' : 'pc';
        document.getElementById('mode-toggle').innerText = state.inputMode.toUpperCase() + " MODE";
    }

    function buy(item, price) {
        if(state.coins >= price && !state.bought.includes(item)) {
            state.coins -= price; state.bought.push(item); refreshUI(); save();
        }
    }

    // --- ENGINE ---
    let activeNotes = [], score = 0, combo = 0, isPlaying = false, spawnInt, timerInt, timeLeft = 60;

    function startRhythm(d) {
        state.currentDiff = d; closeModals();
        isPlaying = true; score = 0; combo = 0; activeNotes = []; 
        timeLeft = diffSettings[d].time;
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('mobile-touch-container').style.display = (state.inputMode === 'mobile' ? 'flex' : 'none');
        
      // Locate this section inside startRhythm(d)
document.getElementById('key-hints').innerHTML = state.keys.map((k, i) => `
    <div class="key-hint-box">
        <div class="lane-dot" style="background:${laneColors[i]}"></div>
        ${k.toUpperCase()} 
    </div>
`).join('');
        
        spawnInt = setInterval(spawnNote, diffSettings[d].rate);
        timerInt = setInterval(updateTimer, 1000);
        requestAnimationFrame(gameUpdate);
    }

    function updateTimer() {
        timeLeft--;
        let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
        document.getElementById('game-timer-display').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        if(timeLeft <= 0) finalizeGame();
    }

    function spawnNote() {
        if(!isPlaying) return;
        const lane = Math.floor(Math.random() * 5);
        const el = document.createElement('div');
        el.className = 'note'; el.style.left = (lane * 20 + 10) + "%"; el.style.color = laneColors[lane];
        document.getElementById('note-layer').appendChild(el);
        activeNotes.push({ el, y: -80, lane, hit: false });
    }

    function gameUpdate() {
        if(!isPlaying) return;
        let speed = diffSettings[state.currentDiff].speed;
        const screenH = window.innerHeight;
        // The impact point is roughly the top of the judgement line (screenH - 120)
        const impactY = screenH - 120;

        for (let i = activeNotes.length - 1; i >= 0; i--) {
            let n = activeNotes[i]; n.y += speed; n.el.style.top = n.y + 'px';
            
            // Auto-miss if note falls below the judgement line
            if(n.y > screenH && !n.hit) {
                n.hit = true; combo = 0; score = Math.max(0, score - 50); renderJudg('MISS', '#ff0000');
                n.el.remove(); activeNotes.splice(i, 1); refreshHUD();
            }
        }
        requestAnimationFrame(gameUpdate);
    }

    function handleHit(lane) {
        if(!isPlaying) return;
        const impactY = window.innerHeight - 100; // Center of the 120px zone
        const noteIndex = activeNotes.findIndex(n => n.lane === lane && !n.hit && Math.abs(n.y - impactY) < 180);
        
        if(noteIndex !== -1) {
            let n = activeNotes[noteIndex]; n.hit = true; let off = Math.abs(n.y - impactY);
            n.el.remove(); activeNotes.splice(noteIndex, 1);
            if(off < 60) { score += 200; combo++; renderJudg('PERFECT', '#0ff'); }
            else { score += 100; combo++; renderJudg('GOOD', '#c084fc'); }
        } else {
            // Shake or subtle miss feedback for empty taps
            combo = 0; renderJudg('MISS', '#ff0000');
        }
        refreshHUD();
    }

    window.onkeydown = (e) => { if(isPlaying && state.inputMode === 'pc') { const l = state.keys.indexOf(e.key.toLowerCase()); if(l!==-1) handleHit(l); } };

    function renderJudg(t, c) {
        const d = document.createElement('div'); d.className = 'judgment-msg'; d.innerText = t; d.style.color = c;
        document.getElementById('game-screen').appendChild(d);
        setTimeout(() => d.remove(), 300);
    }

    function refreshHUD() {
        document.getElementById('live-score').innerText = score.toString().padStart(6, '0');
        document.getElementById('combo-txt').innerText = combo;
    }

    function finalizeGame() {
        isPlaying = false; clearInterval(spawnInt); clearInterval(timerInt);
        let d = state.currentDiff;
        state.missions.forEach(m => { if(m.diff === d && score >= m.req && m.status === 'none') m.status = 'ready'; });
        if(score > state.bestScores[d]) state.bestScores[d] = score;
        alert("FINISHED! SCORE: " + score);
        forceExit();
    }

    function forceExit() { 
        isPlaying = false; clearInterval(spawnInt); clearInterval(timerInt); 
        document.getElementById('game-screen').style.display = 'none'; 
        document.getElementById('note-layer').innerHTML = ''; save(); refreshUI(); 
    }
    
    window.onload = load;
</script>
</body>
</html>
