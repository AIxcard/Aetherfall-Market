<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aetherfall | Event Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #c084fc; --bg: #020205; --panel: rgba(13, 13, 25, 0.95);
            --q-col: #ff00ff; --w-col: #00ffff; --e-col: #ffff00; --r-col: #00ff00; --t-col: #ff4400;
        }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; overflow: hidden; }

        /* --- HUB LAYOUT --- */
        #event-hub { display: flex; width: 100%; height: 100%; padding: 30px; box-sizing: border-box; }
        .sidebar { width: 320px; display: flex; flex-direction: column; gap: 15px; }
        .event-card {
            background: rgba(88, 28, 135, 0.2); border: 2px solid #5b21b6; padding: 15px; 
            display: flex; align-items: center; gap: 15px;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
        }
        .event-card.active { border-color: var(--accent); background: rgba(147, 51, 234, 0.4); }

        .main-panel { flex: 1; padding-left: 50px; }
        .details-box { background: var(--panel); border: 1px solid #333; padding: 40px; max-width: 650px; border-radius: 12px; }
        
        /* Progress Bar */
        .bar-bg { width: 100%; height: 12px; background: #111; border-radius: 6px; margin-top: 8px; overflow: hidden; border: 1px solid #333; }
        #prog-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #c084fc, #6366f1); transition: 1s; }

        .btn-row { display: flex; gap: 12px; margin-top: 30px; }
        .av-btn { flex: 1; border: none; padding: 15px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; border-radius: 4px; font-size: 16px; }
        .back-btn { position: absolute; bottom: 20px; left: 20px; padding: 5px 15px; font-size: 10px; width: auto; background: #111; border: 1px solid #444; color: #666; cursor: pointer; }

        /* --- MODALS --- */
        .modal-overlay { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            z-index: 2000; align-items: center; justify-content: center; 
        }
        .modal-content { background: #0a0a0f; border: 2px solid #333; padding: 30px; width: 800px; height: 500px; display: flex; gap: 20px; position: relative; }
        .close-modal { position: absolute; top: 10px; right: 10px; color: #555; cursor: pointer; font-family: 'Orbitron'; }

        /* Shop Grid */
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .shop-item { background: #111; border: 1px solid #333; padding: 15px; display: flex; justify-content: space-between; align-items: center; }

        /* --- GAMEPLAY --- */
        #game-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 3000; }
        .highway { position: absolute; left: 50%; transform: translateX(-50%); width: 400px; height: 100%; background: #08080c; border-inline: 4px solid #333; }
        .exit-x { position: absolute; top: 20px; right: 20px; border: 1px solid red; color: red; background: none; padding: 5px 10px; cursor: pointer; z-index: 3100; }
        .note { position: absolute; width: 50px; height: 50px; border-radius: 50%; transform: translateX(-50%); border: 2px solid #fff; }
        .note-hold { height: 150px; border-radius: 25px; }
        .flame-effect { animation: flame 0.1s infinite alternate; filter: brightness(2); box-shadow: 0 0 30px currentColor; }
        @keyframes flame { from { transform: translateX(-50%) scale(1); } to { transform: translateX(-50%) scale(1.1); } }
    </style>
</head>
<body>

<div id="event-hub">
    <div class="sidebar">
        <h3 style="font-family:'Orbitron'; color: var(--accent);">EVENTS</h3>
        <div class="event-card active">
            <span style="font-family:'Orbitron'; font-size: 20px;">1</span>
            <div><b>Skele King's Jam</b><br><small style="color: #22c55e;">PERMANENT</small></div>
        </div>
        <button class="back-btn" onclick="window.location.href='game.html'">BACK</button>
    </div>

    <div class="main-panel">
        <div class="details-box">
            <h1 style="font-family:'Orbitron'; margin:0;">Skele King's Jam Session</h1>
            <div class="progress-section" style="margin:20px 0;">
                <div style="display:flex; justify-content:space-between;"><small>Progress</small><small id="prog-val">0/4</small></div>
                <div class="bar-bg"><div id="prog-fill"></div></div>
            </div>
            <p>Owned Currency: <span id="coin-txt" style="color: gold;">0x</span></p>
            <div class="btn-row">
                <button class="av-btn" style="background: #a855f7;" onclick="openModal('shop')">Shop</button>
                <button class="av-btn" style="background: #22c55e;" onclick="openModal('play')">Play</button>
                <button class="av-btn" style="background: #eab308;" onclick="openModal('missions')">Missions</button>
            </div>
        </div>
    </div>
</div>

<div id="shop-modal" class="modal-overlay">
    <div class="modal-content" style="flex-direction:column;">
        <span class="close-modal" onclick="closeModals()">[X] CLOSE</span>
        <h2 style="font-family:'Orbitron';">EVENT SHOP</h2>
        <div class="shop-grid">
            <div class="shop-item"><span>Skele Aura (Cosmetic)</span><button class="av-btn" style="max-width:80px; font-size:12px; background:gold;" onclick="buyItem(50)">50x</button></div>
            <div class="shop-item"><span>Bone Sword Skin</span><button class="av-btn" style="max-width:80px; font-size:12px; background:gold;" onclick="buyItem(100)">100x</button></div>
        </div>
    </div>
</div>

<div id="missions-modal" class="modal-overlay">
    <div class="modal-content" style="flex-direction:column; height:auto; width:400px;">
        <span class="close-modal" onclick="closeModals()">[X] CLOSE</span>
        <h2 style="font-family:'Orbitron';">MISSIONS</h2>
        <div id="mission-list"></div>
    </div>
</div>

<div id="play-modal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModals()">[X] CLOSE</span>
        <div style="flex:1; border-right:1px solid #222;">
            <h3 style="font-family:'Orbitron';">STAGES</h3>
            <div style="padding:15px; background:rgba(192,132,252,0.1); border-left:4px solid var(--accent);">Stage 1: Skele King</div>
        </div>
        <div style="flex:1; text-align:center; padding-top:40px;">
            <p>HIGH SCORE: <span id="hi-score" style="color:var(--accent);">0</span></p>
            <button class="av-btn" id="diff-btn" style="background:#444; width:100%; margin-bottom:10px;" onclick="cycleDiff()">Difficulty: EASY</button>
            <button class="av-btn" style="background:#22c55e; width:100%; height:60px;" onclick="startMatch()">PLAY</button>
        </div>
    </div>
</div>

<div id="game-screen">
    <button class="exit-x" onclick="exitGame()">X EXIT</button>
    <div id="timer" style="position:absolute; top:20px; right:40px; font-family:'Orbitron'; font-size:24px;">01:00</div>
    <div class="highway" id="highway"></div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('av_final_save')) || { coins: 0, cleared: [], hi: {easy:0, med:0, hard:0, expert:0} };
    let diff = 'easy';
    let isPlaying = false, activeNotes = [], score = 0;

    function save() {
        localStorage.setItem('av_final_save', JSON.stringify(data));
        document.getElementById('coin-txt').innerText = data.coins + "x";
        document.getElementById('prog-val').innerText = data.cleared.length + "/4";
        document.getElementById('prog-fill').style.width = (data.cleared.length / 4 * 100) + "%";
    }

    function openModal(id) {
        document.getElementById(id + '-modal').style.display = 'flex';
        if(id === 'play') document.getElementById('hi-score').innerText = data.hi[diff];
        if(id === 'missions') {
            const m = ['easy', 'med', 'hard', 'expert'];
            document.getElementById('mission-list').innerHTML = m.map(k => `
                <div style="padding:10px; border-bottom:1px solid #222; display:flex; justify-content:space-between;">
                    <span>Clear ${k.toUpperCase()}</span>
                    <b style="color:${data.cleared.includes(k) ? '#22c55e' : '#555'}">${data.cleared.includes(k) ? 'DONE' : 'TO-DO'}</b>
                </div>
            `).join('');
        }
    }

    function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }
    
    function cycleDiff() {
        const d = ['easy', 'med', 'hard', 'expert'];
        diff = d[(d.indexOf(diff) + 1) % 4];
        document.getElementById('diff-btn').innerText = "Difficulty: " + diff.toUpperCase();
        document.getElementById('hi-score').innerText = data.hi[diff];
    }

    function buyItem(cost) {
        if(data.coins >= cost) { data.coins -= cost; alert("Purchased!"); save(); }
        else { alert("Not enough coins!"); }
    }

    function exitGame() { isPlaying = false; document.getElementById('game-screen').style.display = 'none'; activeNotes.forEach(n => n.el.remove()); }

    function startMatch() {
        closeModals();
        document.getElementById('game-screen').style.display = 'block';
        isPlaying = true; score = 0; activeNotes = [];
        let time = {easy:60, med:180, hard:300, expert:360}[diff];
        const cfg = {easy:{s:7, r:800, g:5000}, med:{s:10, r:600, g:15000}, hard:{s:13, r:450, g:35000}, expert:{s:18, r:300, g:75000}}[diff];

        const clock = setInterval(() => {
            time--;
            let m = Math.floor(time/60), s = time%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if(time <= 0 || !isPlaying) {
                clearInterval(clock);
                if(isPlaying) {
                    if(score > data.hi[diff]) data.hi[diff] = score;
                    if(score >= cfg.g && !data.cleared.includes(diff)) { data.cleared.push(diff); data.coins += 15; }
                    save(); alert("Match End! Score: " + score); exitGame();
                }
            }
        }, 1000);

        const spawner = setInterval(() => {
            if(!isPlaying) { clearInterval(spawner); return; }
            const lane = Math.floor(Math.random() * 5);
            const isHold = Math.random() > 0.8;
            const el = document.createElement('div');
            el.className = 'note' + (isHold ? ' note-hold' : '');
            el.style.left = (lane * 20 + 10) + "%";
            el.style.color = ['#ff00ff', '#00ffff', '#ffff00', '#00ff00', '#ff4400'][lane];
            document.getElementById('highway').appendChild(el);
            activeNotes.push({ el, y: -100, lane, isHold, hit: false });
        }, cfg.r);

        requestAnimationFrame(function loop() {
            if(!isPlaying) return;
            activeNotes.forEach((n, i) => {
                n.y += cfg.s; n.el.style.top = n.y + 'px';
                if(n.y > window.innerHeight) { n.el.remove(); activeNotes.splice(i, 1); }
            });
            requestAnimationFrame(loop);
        });
    }

    window.onkeydown = (e) => {
        if(!isPlaying) return;
        const k = ['q','w','e','r','t'].indexOf(e.key.toLowerCase());
        const note = activeNotes.find(n => n.lane === k && n.y > window.innerHeight - 200);
        if(note) {
            note.hit = true; score += 100;
            if(note.isHold) note.el.classList.add('flame-effect');
            else note.el.style.display = 'none';
        }
    };

    save();
</script>
</body>
</html>
