<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Access | Auth</title>
    <style>
        body { background: #0d1117; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #161b22; padding: 40px; border: 1px solid #30363d; border-radius: 8px; width: 320px; text-align: center; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        h2 { margin-bottom: 20px; font-weight: 600; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: #58a6ff; ring: 1px solid #58a6ff; }
        button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; transition: background 0.2s; }
        .btn-sign-in { background: #238636; color: white; }
        .btn-sign-in:hover { background: #2ea043; }
        .btn-create { background: #21262d; color: #8b949e; border: 1px solid #30363d; margin-top: 8px; }
        .btn-create:hover { background: #30363d; color: #c9d1d9; }
        #status-msg { font-size: 13px; margin-bottom: 15px; min-height: 18px; transition: 0.3s; }
        .back-link { display: block; margin-top: 20px; color: #58a6ff; text-decoration: none; font-size: 13px; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Market Access</h2>
        <div id="status-msg"></div>
        
        <input type="text" id="userInput" placeholder="Username" autocomplete="off">
        <input type="password" id="passInput" placeholder="Password">
        
        <button class="btn-sign-in" id="loginBtn">Sign In</button>
        <button class="btn-create" id="signUpBtn">Create Account</button>
        
        <a href="index.html" class="back-link">← Back Home</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        // Your Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBVvsUZJlFEMsdjH7FSXxmxCMZgU_zLzBg",
            authDomain: "quickaetherfall.firebaseapp.com",
            projectId: "quickaetherfall",
            storageBucket: "quickaetherfall.firebasestorage.app",
            messagingSenderId: "1061970586865",
            appId: "1:1061970586865:web:ad87fa9b304b0909d04d50"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const msg = document.getElementById('status-msg');
        const uField = document.getElementById('userInput');
        const pField = document.getElementById('passInput');

        // Helper to show messages clearly
        const notify = (text, color) => {
            msg.innerText = text;
            msg.style.color = color;
        };

        // Firebase requires email, so we append a fake domain to the username
        const toEmail = (name) => `${name.trim().toLowerCase()}@market.com`;

        // SIGN UP LOGIC
        document.getElementById('signUpBtn').addEventListener('click', () => {
            const user = uField.value;
            const pass = pField.value;

            if (!user || !pass) {
                notify("Please fill in both fields.", "#ff7b72");
                return;
            }
            if (pass.length < 6) {
                notify("Password must be at least 6 characters.", "#ff7b72");
                return;
            }

            notify("Creating account...", "#58a6ff");

            createUserWithEmailAndPassword(auth, toEmail(user), pass)
                .then((userCredential) => {
                    localStorage.setItem("market_user", user);
                    notify("Account created! Entering market...", "#3fb950");
                    setTimeout(() => { window.location.href = "market.html"; }, 1500);
                })
                .catch((error) => {
                    notify(error.message, "#ff7b72");
                });
        });

        // LOGIN LOGIC
        document.getElementById('loginBtn').addEventListener('click', () => {
            const user = uField.value;
            const pass = pField.value;

            if (!user || !pass) {
                notify("Enter username and password.", "#ff7b72");
                return;
            }

            notify("Verifying...", "#58a6ff");

            signInWithEmailAndPassword(auth, toEmail(user), pass)
                .then(() => {
                    localStorage.setItem("market_user", user);
                    window.location.href = "market.html";
                })
                .catch((error) => {
                    notify("Invalid username or password.", "#ff7b72");
                });
        });
    </script>
</body>
</html>
