```html
<!DOCTYPE html>
<html>
<head>
<title>Aetherfall Market</title>

<style>

/* PAGE */

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial, sans-serif;
color:white;

background:linear-gradient(
-45deg,
#6d28d9,
#9333ea,
#ffffff,
#7c3aed
);

background-size:400% 400%;
animation:bgMove 12s ease infinite;
}

/* background animation */

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* TITLE */

.logo{

font-size:95px;
letter-spacing:6px;

background:linear-gradient(
90deg,
#ffffff,
#c084fc,
#7c3aed,
#ffffff
);

background-size:300%;

-webkit-background-clip:text;
color:transparent;

animation:textMove 6s linear infinite;

text-shadow:
0 0 20px rgba(255,255,255,0.6),
0 0 40px rgba(168,85,247,0.6);

}

@keyframes textMove{
0%{background-position:0%;}
100%{background-position:300%;}
}

/* TAGLINE */

.tagline{
margin-top:15px;
font-size:18px;
letter-spacing:2px;
opacity:0.9;
text-align:center;
max-width:600px;
}

/* ENTER BUTTON */

.enterBtn{

margin-top:50px;

padding:16px 60px;

font-size:18px;

border-radius:12px;

background:#111;

border:2px solid white;

color:white;

text-decoration:none;

transition:0.3s;

}

.enterBtn:hover{

transform:scale(1.15);

box-shadow:
0 0 20px white,
0 0 40px #9333ea;

}

</style>

</head>

<body>

<h1 class="logo">AETHERFALL MARKET</h1>

<div class="tagline">
Discover powerful scripts, unique systems, and custom creations to elevate your game worlds.
</div>

<a href="market.html" class="enterBtn">ENTER</a>

</body>
</html>
