<!DOCTYPE html>
<html>

<head>
<title>Aetherfall Market</title>

<style>

/* BODY */

body{
margin:0;
font-family:Arial;
color:white;
overflow:hidden;

background:linear-gradient(
-45deg,
#020617,
#0f172a,
#1e1b4b,
#3b0764,
#1e1b4b
);

background-size:400% 400%;
animation:skyShift 20s ease infinite;
}

/* SKY SHIFT */

@keyframes skyShift{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* STARS */

.stars{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;

background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(#38bdf8 1px, transparent 1px),
radial-gradient(#a855f7 1px, transparent 1px);

background-size:120px 120px, 200px 200px, 260px 260px;

opacity:0.35;

animation:starMove 100s linear infinite;
}

@keyframes starMove{
from{transform:translateY(0);}
to{transform:translateY(-1000px);}
}

/* PARTICLES */

.particle{
position:fixed;
width:4px;
height:4px;
background:#38bdf8;
border-radius:50%;
opacity:0.7;
pointer-events:none;
}

/* CENTER */

.center{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
animation:fadeIn 2s ease;
}

/* LOGO */

.logo{

font-size:95px;
letter-spacing:6px;

background:linear-gradient(
90deg,
#38bdf8,
#6366f1,
#9333ea,
#38bdf8
);

background-size:300%;

-webkit-background-clip:text;
color:transparent;

animation:logoGradient 8s linear infinite;

text-shadow:
0 0 25px rgba(56,189,248,0.5),
0 0 50px rgba(147,51,234,0.4);

}

/* LOGO GRADIENT */

@keyframes logoGradient{
0%{background-position:0%;}
100%{background-position:300%;}
}

/* SUBTITLE */

.subtitle{
margin-top:10px;
opacity:0.85;
font-size:20px;
letter-spacing:3px;
}

/* BUTTON */

.enterBtn{

margin-top:50px;

padding:16px 60px;

font-size:18px;

border-radius:12px;

background:#0f172a;

border:1px solid #38bdf8;

color:white;

text-decoration:none;

transition:0.35s;

box-shadow:0 0 15px rgba(56,189,248,0.35);

}

.enterBtn:hover{

transform:scale(1.15);

box-shadow:
0 0 25px #38bdf8,
0 0 50px #6366f1;

}

/* FADE */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="stars"></div>

<div class="center">

<h1 class="logo">
AETHERFALL
</h1>

<div class="subtitle">
MARKETPLACE
</div>

<a href="market.html" class="enterBtn">
ENTER
</a>

</div>

<script>

/* MAGIC PARTICLES */

function createParticle(){

let p = document.createElement("div");
p.className="particle";

p.style.left=Math.random()*window.innerWidth+"px";
p.style.top=window.innerHeight+"px";

document.body.appendChild(p);

let speed=1+Math.random()*2;

function animate(){

let y=parseFloat(p.style.top);

p.style.top=(y-speed)+"px";

if(y<-10){
p.remove();
return;
}

requestAnimationFrame(animate);
}

animate();
}

/* spawn particles */

setInterval(createParticle,120);


/* mouse glow */

let glow=document.createElement("div");

glow.style.position="fixed";
glow.style.width="300px";
glow.style.height="300px";
glow.style.borderRadius="50%";
glow.style.pointerEvents="none";
glow.style.background="radial-gradient(circle, rgba(56,189,248,0.15), transparent 70%)";
glow.style.transform="translate(-50%,-50%)";

document.body.appendChild(glow);

document.addEventListener("mousemove",e=>{
glow.style.left=e.clientX+"px";
glow.style.top=e.clientY+"px";
});

</script>

</body>

</html>
