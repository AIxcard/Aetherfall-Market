<!DOCTYPE html>
<html>

<head>

<title>Aetherfall Game Services</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0b1026,#1c1040,#2a1a66);
color:white;
}

.title{
text-align:center;
font-size:50px;
margin-top:50px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
width:80%;
margin:60px auto;
}

.product{
background:#0e1535;
border-radius:18px;
padding:30px;
text-align:center;
border:1px solid rgba(255,255,255,0.1);
}

.product img{
width:100px;
height:100px;
border-radius:10px;
margin-bottom:10px;
}

</style>

</head>

<body>

<h1 class="title">Game Services</h1>

<div class="grid">

<div class="product">
<img src="roblox.png">
<h3>Roblox Grinding Service</h3>
<p>Price: $5</p>
<p>Stock: Available</p>
</div>

<div class="product">
<img src="minecraft.png">
<h3>Minecraft Build Assistance</h3>
<p>Price: $8</p>
<p>Stock: Available</p>
</div>

</div>

<script src="cursor.js"></script>

</body>
</html>
