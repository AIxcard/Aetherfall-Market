<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetherfall | Skele King's Jam Session</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010206; --panel: rgba(5, 5, 15, 0.95); --accent: #c084fc;
            --perfect: #5eead4; --good: #fbbf24; --miss: #ef4444;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; background: var(--bg);
            color: white; font-family: 'Rajdhani', sans-serif; overflow: hidden;
        }

        /* SIDEBAR (Left) & INFO (Right) - AV STYLE */
        #ui-layer { position: absolute; width: 100%; height: 100%; z-index: 10; display: flex; }
        
        .sidebar { 
            width: 320px; background: var(--panel); border-right: 2px solid #1e40af;
            padding: 30px; display: flex; flex-direction: column;
        }

        .event-details { 
            flex: 1; padding: 60px; background: linear-gradient(90deg, rgba(0,0,0,0.8) 0%, transparent 100%);
        }

        /* BUTTONS */
        .nav-btn {
            background: #1e1b4b; border: 1px solid #312e81; color: white;
            padding: 15px; margin: 5px 0; font-family: 'Orbitron'; cursor: pointer;
            text-align: left; transition: 0.2s; clip-path: polygon(0 0, 95% 0, 100% 30%, 100% 100%, 5% 100%, 0 70%);
        }
        .nav-btn:hover { background: var(--accent); color: black; }
        .play-btn { background: #22c55e; color: white; font-size: 20px; padding: 20px; text-align: center; margin-top: 20px; }

        /* RHYTHM HIGHWAY (CENTERED) */
        #game-area { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 20; }
        
        .highway {
            position: absolute; left: 50%; transform: translateX(-50%);
            width: 450px; height: 100%; background: rgba(255,255,255,0.03);
            border-left: 3px solid #222; border-right: 3px solid #222;
        }

        .lane { position: absolute; top: 0; width: 20%; height: 100%; border-right: 1px solid rgba(255,255,255,0.05); }
        .hit-zone { 
            position: absolute; bottom: 120px; width: 100%; height: 60px; 
            border-top: 2px solid rgba(255,255,255,0.2); border-bottom: 2px solid var(--accent);
            background: rgba(192, 132, 252, 0.1);
        }

        /* NOTES */
        .note { 
            position: absolute; width: 80%; left: 10%; height: 40px; 
            background: var(--accent); border-radius: 4px; box-shadow: 0 0 15px var(--accent); 
        }

        /* HUD */
        .hud-left { position: absolute; left: 50px; top: 50%; transform: translateY(-50%); font-family: 'Orbitron'; }
        .hud-right { position: absolute; right: 50px; top: 50%; transform: translateY(-50%); font-family: 'Orbitron'; text-align: right; }
        .rating-popup { 
            position: absolute; left: 50%; top: 40%; transform: translate(-50%, -50%);
            font-size: 40px; font-family: 'Orbitron'; font-weight: 900; pointer-events: none; opacity: 0;
        }

        .perfect { color: var(--perfect); text-shadow: 0 0 20px var(--perfect); }
        .good { color: var(--good); text-shadow: 0 0 20px var(--good); }
        .miss { color: var(--miss); text-shadow: 0 0 20px var(--miss); }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="sidebar">
        <h2 style="font-family:'Orbitron'; color:var(--accent);">EVENTS</h2>
        <button class="nav-btn">1. Valentine's Duo</button>
        <button class="nav-btn" style="border-left: 4px solid var(--accent);">2. Skele King's Jam</button>
        <button class="nav-btn">3. Demonic Rampage</button>
        
        <div style="margin-top:auto;">
            <button class="nav-btn" onclick="window.location.href='game.html'">BACK</button>
        </div>
    </div>

    <div class="event-details">
        <h1 style="font-family:'Orbitron'; font-size: 50px;">Skele King's Jam Session</h1>
        <p style="font-size: 20px; opacity: 0.8;">Jam out with the Skele King! Earn high scores to get great rewards!</p>
        <div style="background: rgba(0,0,0,0.5); padding: 20px; width: 300px; border: 1px solid #333;">
            <small>Rewards:</small><br>
            <b style="color:var(--good)">EventCoin x10</b>
        </div>
        <button class="nav-btn play-btn" onclick="startLevel()">PLAY</button>
    </div>
</div>

<div id="game-area">
    <div class="hud-left">
        <div style="font-size: 14px; opacity: 0.6;">SCORE</div>
        <div id="score-val" style="font-size: 40px;">000000</div>
    </div>

    <div class="highway">
        <div class="lane" style="left:0%" id="lane-q"></div>
        <div class="lane" style="left:20%" id="lane-w"></div>
        <div class="lane" style="left:40%" id="lane-e"></div>
        <div class="lane" style="left:60%" id="lane-r"></div>
        <div class="lane" style="left:80%" id="lane-t"></div>
        <div class="hit-zone"></div>
    </div>

    <div class="hud-right">
        <div id="combo-val" style="font-size: 60px;">0</div>
        <div style="font-size: 14px; opacity: 0.6;">COMBO</div>
    </div>

    <div id="rating-text" class="rating-popup">PERFECT</div>
</div>

<script>
    let score = 0;
    let combo = 0;
    let isPlaying = false;
    let activeNotes = [];
    const keys = ['q', 'w', 'e', 'r', 't'];

    function startLevel() {
        document.getElementById('ui-layer').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        isPlaying = true;
        score = 0;
        combo = 0;
        gameLoop();
        setInterval(spawnNote, 700);
    }

    function spawnNote() {
        if(!isPlaying) return;
        const laneKey = keys[Math.floor(Math.random() * keys.length)];
        const laneEl = document.getElementById('lane-' + laneKey);
        
        const noteEl = document.createElement('div');
        noteEl.className = 'note';
        noteEl.style.top = '-50px';
        laneEl.appendChild(noteEl);

        activeNotes.push({ el: noteEl, y: -50, key: laneKey, hit: false });
    }

    function showRating(text, type) {
        const r = document.getElementById('rating-text');
        r.innerText = text;
        r.className = 'rating-popup ' + type;
        r.style.opacity = '1';
        setTimeout(() => r.style.opacity = '0', 400);
    }

    function updateScore(amount) {
        score += amount;
        if(score < 0) score = 0; // Prevent negative
        document.getElementById('score-val').innerText = score.toString().padStart(6, '0');
    }

    function gameLoop() {
        if(!isPlaying) return;

        for(let i = activeNotes.length - 1; i >= 0; i--) {
            let n = activeNotes[i];
            n.y += 7; // Note Speed
            n.el.style.top = n.y + 'px';

            // Auto-Miss if it goes past the bottom
            if(n.y > window.innerHeight) {
                if(!n.hit) {
                    showRating("MISSED", "miss");
                    combo = 0;
                    updateScore(-100);
                    document.getElementById('combo-val').innerText = combo;
                }
                n.el.remove();
                activeNotes.splice(i, 1);
            }
        }
        requestAnimationFrame(gameLoop);
    }

    window.addEventListener('keydown', (e) => {
        if(!isPlaying) return;
        const key = e.key.toLowerCase();
        
        // Find notes in the correct lane within the timing window
        const hitZoneY = window.innerHeight - 180; // Approximate position of hit-zone
        
        const note = activeNotes.find(n => n.key === key && !n.hit && n.y > (hitZoneY - 100));

        if(note) {
            const diff = Math.abs(n.y - hitZoneY);
            
            if(diff < 30) {
                showRating("PERFECT", "perfect");
                updateScore(150);
                combo++;
            } else {
                showRating("GOOD", "good");
                updateScore(100);
                combo++;
            }
            
            note.hit = true;
            note.el.style.display = 'none';
            document.getElementById('combo-val').innerText = combo;
        }
    });
</script>
</body>
</html>
