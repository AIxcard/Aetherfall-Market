<!DOCTYPE html>

<html>

<head>

<title>Abyssal Market</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#020617;
color:white;
overflow:hidden;
}

/* STAR BACKGROUND */

.stars{
position:fixed;
width:100%;
height:200%;
top:-100%;
left:0;

background:
radial-gradient(white 1px, transparent 1px),
radial-gradient(#60a5fa 1px, transparent 1px),
radial-gradient(#3b82f6 2px, transparent 2px);

background-size:120px 120px,200px 200px,300px 300px;

animation:starsMove 120s linear infinite;

z-index:-2;
}

@keyframes starsMove{
from{transform:translateY(0)}
to{transform:translateY(2000px)}
}

/* CENTER CONTAINER */

.center{

height:100vh;

display:flex;
flex-direction:column;

align-items:center;
justify-content:center;

text-align:center;

animation:fadeUp 1.6s ease;

}

/* LOGO */

.logo{

font-size:80px;
letter-spacing:10px;
font-weight:bold;

background:linear-gradient(90deg,#38bdf8,#6366f1,#9333ea);

-webkit-background-clip:text;
color:transparent;

text-shadow:
0 0 10px rgba(147,51,234,.5),
0 0 20px rgba(147,51,234,.4),
0 0 40px rgba(99,102,241,.4);

margin-bottom:20px;

}

/* SUBTEXT */

.tag{

font-size:22px;
color:#94a3b8;
letter-spacing:2px;

}

/* ENTER BUTTON */

.enter{

margin-top:40px;

padding:18px 45px;

font-size:20px;

border-radius:12px;

background:#2563eb;

border:none;

color:white;

cursor:pointer;

transition:.25s;

}

.enter:hover{

transform:scale(1.1);

box-shadow:0 0 20px #2563eb;

}

/* FADE TRANSITION */

#fade{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#020617;

opacity:0;

pointer-events:none;

transition:opacity .8s ease;

z-index:9999;

}

#fade.active{
opacity:1;
pointer-events:auto;
}

/* ANIMATIONS */

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<div class="stars"></div>

<div id="fade"></div>

<div class="center">

<div class="logo">
ABYSSAL MARKET
</div>

<div class="tag">
Roblox Services • Game Items • Snacks
</div>

<button class="enter" onclick="enterMarket()">
ENTER MARKET
</button>

</div>

<script>

/* ENTER TRANSITION */

function enterMarket(){

const fade=document.getElementById("fade")

fade.classList.add("active")

setTimeout(function(){

window.location.href="market.html"

},700)

}

</script>

</body>
</html>
