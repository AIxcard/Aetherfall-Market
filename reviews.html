<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

    // Matches your screenshot URL exactly
    const firebaseConfig = {
        apiKey: "AIzaSyBVvsUZJlFEMsdjH7FSXxmxCMZgU_zLzBg",
        authDomain: "quickaetherfall.firebaseapp.com",
        projectId: "quickaetherfall",
        databaseURL: "https://quickaetherfall-default-rtdb.firebaseio.com/",
        storageBucket: "quickaetherfall.firebasestorage.app",
        messagingSenderId: "1061970586865",
        appId: "1:1061970586865:web:ad87fa9b304b0909d04d50"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- REGISTRATION LOGIC ---
    window.executeRegistry = function() {
        const user = document.getElementById("reg-user").value.trim();
        const pass = document.getElementById("reg-pass").value.trim();

        if (!user || !pass) return alert("All fields required.");

        const userRef = ref(db, 'users/' + user);
        
        // Check if user exists first
        get(userRef).then((snapshot) => {
            if (snapshot.exists()) {
                alert("Identity Code already taken.");
            } else {
                set(userRef, { password: pass }).then(() => {
                    localStorage.setItem("market_user", user);
                    alert("Registry Established!");
                    window.location.href = "market.html";
                });
            }
        });
    }

    // --- SIGN IN LOGIC ---
    window.executeAuth = function() {
        const user = document.getElementById("auth-user").value.trim();
        const pass = document.getElementById("auth-pass").value.trim();

        get(child(ref(db), `users/${user}`)).then((snapshot) => {
            if (snapshot.exists() && snapshot.val().password === pass) {
                localStorage.setItem("market_user", user);
                alert("Authorization Successful.");
                window.location.href = "market.html";
            } else {
                alert("Invalid Identity or Access Key.");
            }
        }).catch((error) => alert("Connection Error."));
    }
</script>
