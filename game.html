<!DOCTYPE html>
<html>

<head>
<title>Aetherfall Click Game</title>

<style>

body{
margin:0;
font-family:Arial;
background:radial-gradient(circle at top,#0a0f2e,#020617);
color:white;
overflow:hidden;
}

/* TOP BAR */

header{
height:80px;
display:flex;
align-items:center;
justify-content:center;
font-size:36px;
color:#a855f7;
letter-spacing:3px;
box-shadow:0 0 20px #9333ea;
}

/* MAIN GRID */

#layout{
display:grid;
grid-template-columns:350px 1fr 350px;
height:calc(100vh - 80px);
}

/* LEFT PANEL */

.panel{
padding:25px;
overflow:auto;
}

.panel h2{
margin-top:0;
color:#38bdf8;
}

/* MISSIONS */

.mission{
background:#0f172a;
border-radius:12px;
padding:16px;
margin-bottom:15px;
border:1px solid #1e3a8a;
}

.missionTitle{
font-size:16px;
margin-bottom:6px;
}

.bar{
height:10px;
background:#1e293b;
border-radius:6px;
overflow:hidden;
}

.fill{
height:100%;
background:#22c55e;
width:0%;
}

/* CENTER AREA */

#center{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
position:relative;
}

#sword{
width:260px;
cursor:pointer;
transition:0.15s;
}

#sword:hover{
transform:scale(1.05);
filter:drop-shadow(0 0 20px #9333ea);
}

#sword:active{
transform:scale(0.92);
}

/* FLOATING CLICK TEXT */

.float{
position:absolute;
color:#38bdf8;
font-weight:bold;
pointer-events:none;
animation:floatUp 1s ease-out forwards;
}

@keyframes floatUp{
0%{opacity:1;transform:translateY(0)}
100%{opacity:0;transform:translateY(-60px)}
}

/* STATS */

#stats{
margin-top:20px;
font-size:20px;
text-align:center;
}

.progress{
width:420px;
height:14px;
background:#1e293b;
border-radius:8px;
overflow:hidden;
margin-top:10px;
}

.progressFill{
height:100%;
background:#38bdf8;
width:0%;
}

/* SHOP */

.shopItem{
background:#0f172a;
border:1px solid #1e3a8a;
border-radius:12px;
padding:16px;
margin-bottom:15px;
}

.shopItem button{
margin-top:8px;
background:#9333ea;
border:none;
padding:7px 12px;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<header>AETHERFALL CLICK GAME</header>

<div id="layout">

<div class="panel">

<h2>Missions</h2>

<div class="mission">
<div class="missionTitle">5,000 Clicks — 40 Coins</div>
<div class="bar"><div id="m1" class="fill"></div></div>
</div>

<div class="mission">
<div class="missionTitle">25,000 Clicks — 120 Coins</div>
<div class="bar"><div id="m2" class="fill"></div></div>
</div>

<div class="mission">
<div class="missionTitle">100,000 Clicks — 450 Coins</div>
<div class="bar"><div id="m3" class="fill"></div></div>
</div>

</div>


<div id="center">

<img
id="sword"
src="Final_game_icon.png"
onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/3/3f/Placeholder_view_vector.svg'"
>

<div id="stats">
Clicks: <span id="clicks">0</span><br>
Coins: <span id="coins">0</span>

<div class="progress">
<div id="bar" class="progressFill"></div>
</div>

1000 clicks → 10 coins

</div>

</div>


<div class="panel">

<h2>Coupon Shop</h2>

<div class="shopItem">
5 Baht Discount<br>
Cost: 180 coins<br>
<button onclick="buyCoupon(180,5)">Buy</button>
</div>

<div class="shopItem">
10 Baht Discount<br>
Cost: 380 coins<br>
<button onclick="buyCoupon(380,10)">Buy</button>
</div>

<div class="shopItem">
20 Baht Discount<br>
Cost: 780 coins<br>
<button onclick="buyCoupon(780,20)">Buy</button>
</div>

<h2>Your Coupons</h2>
<div id="couponList"></div>

</div>

</div>

<script>

let clicks=0
let coins=0
let coupons=[]
let lastClick=0

const sword=document.getElementById("sword")

sword.onclick=(e)=>{

let now=Date.now()
if(now-lastClick<70)return
lastClick=now

clicks++

spawnText(e)

if(clicks%1000===0){
coins+=10
}

update()

}

function spawnText(e){

let t=document.createElement("div")
t.className="float"
t.innerText="+1"

t.style.left=e.pageX+"px"
t.style.top=e.pageY+"px"

document.body.appendChild(t)

setTimeout(()=>t.remove(),1000)

}

function update(){

document.getElementById("clicks").innerText=clicks
document.getElementById("coins").innerText=coins

let p=(clicks%1000)/10
document.getElementById("bar").style.width=p+"%"

updateMission("m1",5000)
updateMission("m2",25000)
updateMission("m3",100000)

let list=""
coupons.forEach(c=>list+=c+"<br>")
document.getElementById("couponList").innerHTML=list

save()

}

function updateMission(id,goal){

let percent=Math.min(100,(clicks/goal)*100)
document.getElementById(id).style.width=percent+"%"

}

function buyCoupon(cost,val){

if(coins<cost){
alert("Not enough coins")
return
}

coins-=cost

let code="ABYSS-"+Math.floor(Math.random()*9000+1000)
coupons.push(code+" ("+val+" Baht Discount)")

update()

}

function save(){

localStorage.setItem("c",clicks)
localStorage.setItem("co",coins)
localStorage.setItem("cp",JSON.stringify(coupons))

}

function load(){

let c=localStorage.getItem("c")
let co=localStorage.getItem("co")
let cp=localStorage.getItem("cp")

if(c)clicks=parseInt(c)
if(co)coins=parseInt(co)
if(cp)coupons=JSON.parse(cp)

update()

}

load()

</script>

</body>
</html>
