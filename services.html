<!DOCTYPE html>

<html>

<head>

<title>Aetherfall Market Services</title>

<link rel="stylesheet" href="style.css">

<style>

.header{

text-align:center;

font-size:60px;

margin-top:40px;

background:linear-gradient(90deg,#38bdf8,#6366f1,#9333ea);

-webkit-background-clip:text;

color:transparent;

}

/* category grid */

.categoryGrid{

max-width:1000px;

margin:auto;

display:grid;

grid-template-columns:repeat(auto-fit,minmax(260px,1fr));

gap:40px;

padding:60px;

}

.category{

background:#0f172a;

border-radius:18px;

padding:40px;

text-align:center;

border:1px solid #1e3a8a;

cursor:pointer;

transition:.3s;

}

.category:hover{

transform:scale(1.1);

box-shadow:0 0 30px #2563eb;

border-color:#38bdf8;

}

/* game list */

.gameList{

max-width:900px;

margin:auto;

padding:40px;

display:none;

}

.game{

background:#0f172a;

border-radius:12px;

padding:20px;

margin-top:15px;

border:1px solid #1e3a8a;

cursor:pointer;

transition:.25s;

}

.game:hover{

border-color:#38bdf8;

transform:scale(1.05);

}

/* item list */

.itemList{

max-width:900px;

margin:auto;

padding:40px;

display:none;

}

.item{

background:#0f172a;

border-radius:12px;

padding:15px;

margin-top:10px;

border:1px solid #1e3a8a;

cursor:pointer;

transition:.25s;

}

.item:hover{

border-color:#38bdf8;

transform:scale(1.05);

}

/* detail box */

.detailBox{

max-width:500px;

margin:40px auto;

background:#0f172a;

padding:30px;

border-radius:16px;

border:1px solid #38bdf8;

display:none;

}

</style>

</head>

<body>

<div class="stars"></div>

<h1 class="header">AETHERFALL MARKET</h1>

<!-- STEP 1 CATEGORY -->

<div class="categoryGrid">

<div class="category" onclick="openRoblox()">
Roblox Services
</div>

<div class="category" onclick="openSnacks()">
Snacks
</div>

</div>

<!-- STEP 2 GAMES -->

<div id="gameList" class="gameList">

<h2>Roblox Games</h2>

<div class="game" onclick="openItems('spirits')">Anime Spirits</div>

<div class="game" onclick="openItems('verse')">Verse Piece</div>

<div class="game" onclick="openItems('case')">Case Paradise</div>

<div class="game" onclick="openItems('vanguard')">Anime Vanguards</div>

<div class="game" onclick="openItems('paradox')">Anime Paradox</div>

<div class="game" onclick="openItems('forest')">99 Nights In The Forest</div>

<div class="game" onclick="openItems('ftf')">Flee The Facility</div>

<div class="game" onclick="openItems('rivals')">Rivals</div>

</div>

<!-- STEP 3 ITEMS -->

<div id="itemList" class="itemList"></div>

<!-- ITEM DETAILS -->

<div id="detailBox" class="detailBox"></div>
