<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Aetherfall</title>

<style>

html,body{
margin:0;
height:100%;
overflow:hidden;
background:#050816;
font-family:Segoe UI,Arial;
color:white;
}

header{
text-align:center;
font-size:38px;
padding:18px;
color:#a78bfa;
font-weight:bold;
}

#backBtn{
position:absolute;
left:20px;
top:20px;
background:#0f172a;
border:1px solid #1e3a8a;
padding:8px 14px;
border-radius:8px;
color:white;
cursor:pointer;
}

#levelWrap{
width:520px;
margin:auto;
text-align:center;
}

.bar{
background:#1e293b;
height:20px;
border-radius:8px;
overflow:hidden;
position:relative;
}

.fill{
height:100%;
background:#8b5cf6;
width:0%;
}

.barText{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
font-size:12px;
pointer-events:none;
}

#stats{
display:flex;
justify-content:center;
gap:20px;
margin-top:15px;
}

.stat{
background:#0f172a;
border:1px solid #1e3a8a;
padding:10px 18px;
border-radius:8px;
text-align:center;
}

#layout{
display:grid;
grid-template-columns:250px 1fr 300px;
height:calc(100vh - 170px);
}

.panel{
padding:20px;
overflow:hidden;
}

#center{
display:flex;
align-items:center;
justify-content:center;
}

#sword{
width:280px;
cursor:pointer;
transition:.15s;
}

#sword:hover{
transform:scale(1.05);
}

.menuBtn{
background:#0f172a;
border:1px solid #1e3a8a;
padding:18px;
margin-bottom:14px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.menuBtn:hover{
background:#1e293b;
}

.missionBox{
background:#020617;
border:1px solid #2563eb;
padding:14px;
border-radius:10px;
margin-bottom:15px;
}

.modal{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#020617;
border:1px solid #2563eb;
border-radius:10px;
width:900px;
height:650px;
padding:25px;
overflow:auto;
}

.close{
position:absolute;
top:10px;
right:14px;
cursor:pointer;
}

.shopItem{
background:#0f172a;
border:1px solid #1e3a8a;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

button{
margin-top:6px;
padding:6px 12px;
background:#8b5cf6;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.carousel{
display:flex;
align-items:center;
justify-content:center;
gap:20px;
margin-bottom:20px;
}

.card{
width:150px;
height:180px;
background:#0f172a;
border:2px solid #1e3a8a;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
}

.active{
border-color:#facc15;
}

.rewardBox{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

.reward{
background:#0f172a;
border:1px solid #1e3a8a;
padding:10px;
border-radius:8px;
}

.float{
position:absolute;
pointer-events:none;
font-weight:bold;
animation:floatUp 1s forwards;
}

@keyframes floatUp{
0%{opacity:1;transform:translateY(0)}
100%{opacity:0;transform:translateY(-60px)}
}

</style>

</head>

<body>

<button id="backBtn" onclick="location.href='market.html'">← Market</button>

<header>AETHERFALL</header>

<div id="levelWrap">

<div id="levelText">Level 1 — 0 / 200 EXP</div>

<div class="bar">
<div id="levelFill" class="fill"></div>
<span class="barText" id="levelPercent">0%</span>
</div>

</div>

<div id="stats">

<div class="stat">Clicks<br><span id="clicks">0</span></div>
<div class="stat">Coins<br><span id="coins">0</span></div>
<div class="stat">Fragments<br><span id="fragments">0</span></div>
<div class="stat">Combo<br><span id="combo">0</span></div>

</div>

<div id="layout">

<div class="panel">

<div class="menuBtn" onclick="openModal('lore')">📘 Lore</div>
<div class="menuBtn" onclick="openModal('guide')">❓ Guide</div>
<div class="menuBtn" onclick="openModal('shop')">🛒 Shop</div>
<div class="menuBtn" onclick="openModal('upgrades')">⚡ Upgrades</div>
<div class="menuBtn" onclick="openModal('milestones')">🏆 Milestones</div>

</div>

<div id="center">
<img id="sword" src="Final_game_icon.png">
</div>

<div class="panel">

<div class="missionBox">

<h3>Storyline</h3>
<div id="storyText"></div>

<div class="bar">
<div id="storyFill" class="fill"></div>
<span id="storyPercent" class="barText">0%</span>
</div>

<button onclick="claimStory()">Claim Reward</button>

</div>

<div class="missionBox">

<h3>Daily Mission</h3>

Goal: 2000 clicks
Reward: 200 coins

<div class="bar">
<div id="dailyFill" class="fill"></div>
<span id="dailyPercent" class="barText">0%</span>
</div>

<div id="dailyTimer"></div>

<button onclick="claimDaily()">Claim Daily</button>

</div>

</div>

</div>

<div id="lore" class="modal">
<div class="close" onclick="closeModal('lore')">X</div>
<h2>Aetherfall Chronicle</h2>
<div id="lorePage"></div>
<button onclick="prevLore()">←</button>
<button onclick="nextLore()">→</button>
</div>

<script>

/* GAME DATA */

let clicks=0
let coins=0
let fragments=0
let combo=0
let power=1

let level=1
let exp=0

let dailyClicks=0
let lastDailyClaim=0
let storyStage=0

let fragmentBoost=1
let autoclicker=false

let lastClickTime=Date.now()

/* FLOAT TEXT */

function float(e,t){
let d=document.createElement("div")
d.className="float"
d.innerText=t
d.style.left=e.pageX+"px"
d.style.top=e.pageY+"px"
document.body.appendChild(d)
setTimeout(()=>d.remove(),1000)
}

function msg(text){
float({pageX:window.innerWidth/2,pageY:window.innerHeight/2},text)
}

/* EXP */

function expNeeded(lvl){
return Math.min(200 + lvl*lvl*5,50000)
}

function gainExp(v){
exp+=v
while(exp>=expNeeded(level) && level<100){
exp-=expNeeded(level)
level++
}
}

/* CLICK */

const sword=document.getElementById("sword")

sword.onclick=e=>{

lastClickTime=Date.now()

let gain=power+Math.floor(combo/30)

clicks+=gain
dailyClicks+=gain
combo++

gainExp(0.02)

if(combo%(150/fragmentBoost)==0){
fragments++
float(e,"+1 Fragment")
}

if(Math.random()<0.005){
coins+=10
float(e,"+10 Coins")
}

if(Math.random()<0.001){
fragments++
float(e,"+1 Fragment")
}

float(e,"+"+gain)

}

/* COMBO RESET */

setInterval(()=>{
if(Date.now()-lastClickTime>3000){
combo=0
}
},200)

/* STORY */

const storyGoals=[100,1000,10000,100000,1000000]
const storyRewards=[20,50,120,400,1200]

function claimStory(){

if(storyStage>=storyGoals.length){
msg("All Completed")
return
}

if(clicks>=storyGoals[storyStage]){

coins+=storyRewards[storyStage]
storyStage++
msg("Reward Claimed")

}else{
msg("Not Ready")
}

}

/* DAILY */

function claimDaily(){

let now=Date.now()

if(now-lastDailyClaim<86400000){
msg("Already Claimed")
return
}

if(dailyClicks>=2000){

coins+=200
dailyClicks=0
lastDailyClaim=now
msg("Daily Claimed")

}else{
msg("Not Ready")
}

}

/* UPDATE UI */

function update(){

document.getElementById("clicks").innerText=Math.floor(clicks)
document.getElementById("coins").innerText=coins
document.getElementById("fragments").innerText=fragments
document.getElementById("combo").innerText=combo

let need=expNeeded(level)
let percent=(exp/need)*100

document.getElementById("levelText").innerText="Level "+level+" — "+Math.floor(exp)+" / "+need+" EXP"
document.getElementById("levelFill").style.width=percent+"%"
document.getElementById("levelPercent").innerText=Math.floor(percent)+"%"

}

/* SAVE */

function save(){
localStorage.setItem("aetherfall_save",JSON.stringify({
clicks,coins,fragments,combo,power,level,exp,dailyClicks,lastDailyClaim,storyStage
}))
}

function load(){

let s=localStorage.getItem("aetherfall_save")
if(!s)return

let data=JSON.parse(s)
for(let k in data){
window[k]=data[k]
}

}

load()

setInterval(()=>{
update()
save()
},500)

</script>

<script src="cursor.js"></script>

</body>
</html>
