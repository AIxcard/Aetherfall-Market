<!DOCTYPE html>
<html>

<head>

<title>Abyssal Market</title>

<style>

body{
margin:0;
background:#020617;
color:white;
font-family:Arial;
overflow:hidden;
}

/* STAR BACKGROUND */

.stars{
position:fixed;
width:100%;
height:200%;
top:-100%;
left:0;

background:
radial-gradient(white 1px, transparent 1px),
radial-gradient(#60a5fa 1px, transparent 1px);

background-size:120px 120px,200px 200px;

animation:starsMove 120s linear infinite;
z-index:-1;
}

@keyframes starsMove{
from{transform:translateY(0)}
to{transform:translateY(2000px)}
}

/* CENTER */

.center{

height:100vh;

display:flex;
flex-direction:column;

align-items:center;
justify-content:center;

text-align:center;

}

/* LOGO */

.logo{

font-size:80px;

letter-spacing:8px;

background:linear-gradient(90deg,#38bdf8,#6366f1,#9333ea);

-webkit-background-clip:text;
color:transparent;

text-shadow:0 0 30px rgba(147,51,234,.5);

animation:fadeIn 2s ease;

}

/* SUBTEXT */

.tag{

margin-top:15px;
font-size:20px;
color:#94a3b8;

animation:fadeIn 3s ease;

}

/* ENTER BUTTON */

.enter{

margin-top:40px;

padding:18px 40px;

font-size:20px;

border-radius:10px;

background:#2563eb;

text-decoration:none;

color:white;

transition:.25s;

animation:fadeIn 4s ease;

}

.enter:hover{

transform:scale(1.1);

box-shadow:0 0 20px #2563eb;

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<div class="stars"></div>

<div class="center">

<div class="logo">NOVA MARKET</div>

<div class="tag">
Roblox Services • Game Items • Snacks
</div>

<a class="enter" href="market.html">
ENTER MARKET
</a>

</div>

</body>

</html>
