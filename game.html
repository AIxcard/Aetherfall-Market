body{

<body>

<header>AETHERFALL</header>

<div id="levelBarWrap">
<div id="levelText">Level 1 — 0 / 200 EXP</div>
<div id="levelBar"><div id="levelFill"></div></div>
</div>

<div id="stats">

<div class="stat">Clicks<br><span id="clicks">0</span></div>
<div class="stat">Coins<br><span id="coins">0</span></div>
<div class="stat">Fragments<br><span id="fragments">0</span></div>
<div class="stat">Combo<br><span id="combo">0</span></div>

</div>

<div id="layout">

<div class="panel">

<div id="menu">

<div class="menuBtn" onclick="openLore()">
<div class="icon">📘</div>
Lore
</div>

<div class="menuBtn" onclick="openGuide()">
<div class="icon">❓</div>
Guide
</div>

<div class="menuBtn" onclick="openUpgrades()">
<div class="icon">⚡</div>
Upgrades
</div>

<div class="menuBtn" onclick="openShop()">
<div class="icon">🛒</div>
Shop
</div>

<div class="menuBtn" onclick="openMilestones()">
<div class="icon">🏆</div>
Milestones
</div>

</div>

</div>

<div id="center">
<img id="sword" src="Final_game_icon.png">
</div>

<div class="panel">

<h3>Storyline</h3>

<div class="mission">

<div id="storyText"></div>

<div class="bar">
<div id="storyFill" class="fill"></div>
</div>

<div id="storyPercent"></div>

<button onclick="claimStory()">Claim</button>

</div>

<h3>Daily Mission</h3>

<div class="mission">

Goal: 2000 clicks

<div class="bar">
<div id="dailyFill" class="fill"></div>
</div>

<div id="dailyTimer"></div>

<button onclick="claimDaily()">Claim</button>

</div>

</div>

</div>

<div id="milestones" class="modal">
<div class="close" onclick="closeMilestones()">X</div>
<h2>Level Milestones</h2>
<div id="milestoneList"></div>
</div>

<div id="lore" class="modal">
<div class="close" onclick="closeLore()">X</div>
<h2>Aetherfall Chronicle</h2>
<p id="loreText"></p>
</div>

<script>

let clicks=0
let coins=0
let fragments=0
let combo=0
let power=1

let level=1
let exp=0

let auto=false

let lastClick=0
let dailyProgress=0
let lastDailyClaim=0

let lastShopReset=Date.now()

const storyGoals=[100,500,2000,10000,50000,200000,1000000,5000000,20000000,100000000]
const storyRewards=[20,40,80,150,300,700,1500,2500,5000,10000]
let storyStage=0

function expNeeded(lvl){
return Math.floor(200+(lvl*lvl*5))
}

function gainExp(v){
exp+=v
while(exp>=expNeeded(level) && level<100){
exp-=expNeeded(level)
level++
}
}

const sword=document.getElementById("sword")

sword.onclick=e=>{

let now=Date.now()

if(now-lastClick>2000)combo=0
combo++
lastClick=now

let gain=power+Math.floor(combo/30)

clicks+=gain
dailyProgress+=gain

gainExp(0.3)

if(combo%150==0)fragments++

float(e,"+"+gain)

update()

}

function float(e,t){
let d=document.createElement("div")
d.className="float"
d.innerText=t
d.style.left=e.pageX+"px"
d.style.top=e.pageY+"px
document.body.appendChild(d)
setTimeout(()=>d.remove(),1000)
}

function claimStory(){
if(storyStage>=storyGoals.length)return
if(clicks>=storyGoals[storyStage]){
coins+=storyRewards[storyStage]
gainExp(200)
storyStage++
}
}

function claimDaily(){

let now=Date.now()

if(now-lastDailyClaim<86400000)return

if(dailyProgress>=2000){
coins+=200
gainExp(400)
dailyProgress=0
lastDailyClaim=now
}

}

function update(){

document.getElementById("clicks").innerText=Math.floor(clicks)
document.getElementById("coins").innerText=coins
document.getElementById("fragments").innerText=fragments
document.getElementById("combo").innerText=combo

let need=expNeeded(level)
let p=Math.min((exp/need)*100,100)

document.getElementById("levelText").innerText=
"Level "+level+" — "+Math.floor(exp)+" / "+need+" EXP"

document.getElementById("levelFill").style.width=p+"%"

if(storyStage<storyGoals.length){

let g=storyGoals[storyStage]
let p=Math.min((clicks/g)*100,100)

document.getElementById("storyText").innerText=
"Reach "+g.toLocaleString()+" clicks | Reward: "+storyRewards[storyStage]+" coins"

document.getElementById("storyFill").style.width=p+"%"
document.getElementById("storyPercent").innerText=Math.floor(p)+"%"

}

let d=Math.min((dailyProgress/2000)*100,100)
document.getElementById("dailyFill").style.width=d+"%"

let now=Date.now()
let diff=86400000-(now-lastDailyClaim)

if(diff>0){

let h=Math.floor(diff/3600000)
let m=Math.floor((diff%3600000)/60000)

document.getElementById("dailyTimer").innerText=
"Ready in "+h+"h "+m+"m"

}else{
document.getElementById("dailyTimer").innerText="Ready"
}

}

function openMilestones(){
document.getElementById("milestones").style.display="block"
drawMilestones()
}

function closeMilestones(){
document.getElementById("milestones").style.display="none"
}

function drawMilestones(){

let box=document.getElementById("milestoneList")
box.innerHTML=""

for(let i=5;i<=100;i+=5){

let d=document.createElement("div")

let reward=i*50

d.innerHTML=
"Level "+i+" Reward: "+reward+" coins"

if(level>=i){
let b=document.createElement("button")
b.innerText="Claim"
b.onclick=()=>{coins+=reward;b.disabled=true}
d.appendChild(b)
}

box.appendChild(d)

}

}

function openLore(){document.getElementById("lore").style.display="block"}
function closeLore(){document.getElementById("lore").style.display="none"}

setInterval(update,200)

</script>

</body>
</html>
