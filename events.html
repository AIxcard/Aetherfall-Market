<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aetherfall | Event Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #c084fc; --bg: #020205; --panel: rgba(13, 13, 25, 0.98);
        }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; overflow: hidden; }

        /* --- HUB LAYOUT --- */
        #event-hub { display: flex; width: 100%; height: 100%; }
        
        .sidebar { 
            width: 400px; background: rgba(10, 10, 20, 0.8); border-right: 2px solid #222; 
            display: flex; flex-direction: column; padding: 40px 20px; box-sizing: border-box;
        }

        .event-list-item {
            background: rgba(255, 255, 255, 0.03); border: 1px solid #333; padding: 25px; 
            margin-bottom: 15px; border-radius: 8px; display: flex; align-items: center; gap: 20px;
        }
        .event-list-item.active { border-left: 6px solid var(--accent); background: rgba(192, 132, 252, 0.1); }

        .main-content { flex: 1; padding: 80px; display: flex; flex-direction: column; justify-content: center; }
        .event-header { font-family: 'Orbitron'; font-size: 64px; margin: 0; }
        .event-desc { font-size: 22px; color: #aaa; max-width: 800px; margin-bottom: 40px; }

        /* Progress Bar */
        .progress-container { max-width: 900px; margin-bottom: 50px; }
        .bar-bg { width: 100%; height: 20px; background: #111; border-radius: 10px; margin-top: 15px; overflow: hidden; border: 1px solid #333; }
        #prog-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #c084fc, #6366f1); transition: 0.5s; }

        .btn-row { display: flex; gap: 20px; max-width: 900px; }
        .av-btn { 
            flex: 1; height: 80px; border: none; font-family: 'Orbitron'; font-weight: 900; 
            font-size: 20px; cursor: pointer; border-radius: 8px;
        }

        /* --- GAMEPLAY HUD --- */
        #game-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 5000; }
        #game-timer { position: absolute; top: 40px; left: 40px; font-family: 'Orbitron'; font-size: 48px; }
        #game-score { position: absolute; top: 100px; left: 40px; font-family: 'Orbitron'; font-size: 24px; color: var(--accent); }
        .exit-btn { position: absolute; top: 40px; right: 40px; background: #700; color: white; border: none; padding: 15px 30px; font-family: 'Orbitron'; cursor: pointer; z-index: 5100; }

        .highway { 
            position: absolute; left: 50%; transform: translateX(-50%); width: 500px; height: 100%; 
            background: #08080c; border-inline: 4px solid #333; overflow: hidden;
        }
        .lane-key { 
            position: absolute; bottom: 0; width: 100%; display: flex; justify-content: space-around; 
            font-family: 'Orbitron'; font-size: 24px; color: rgba(255,255,255,0.5); padding: 20px 0;
            background: linear-gradient(transparent, rgba(192, 132, 252, 0.2));
        }

        .note { 
            position: absolute; width: 80px; height: 30px; background: #c084fc; 
            border-radius: 4px; box-shadow: 0 0 15px #c084fc; transform: translateX(-50%);
        }

        /* Modals */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 6000; align-items: center; justify-content: center; }
        .modal-content { background: #0a0a0f; border: 2px solid #333; padding: 50px; width: 600px; }
    </style>
</head>
<body>

<div id="event-hub">
    <div class="sidebar">
        <h2 style="font-family:'Orbitron';">CURRENT EVENTS</h2>
        <div class="event-list-item active">
            <b style="font-size: 20px;">01 Skele King's Jam Session</b>
        </div>
        <button class="av-btn" style="margin-top:auto; background:#222; height:50px;" onclick="location.reload()">BACK</button>
    </div>

    <div class="main-content">
        <h1 class="event-header">Skele King's Jam Session</h1>
        <p class="event-desc">Earn high scores to stabilize the fracture and unlock rewards.</p>
        
        <div class="progress-container">
            <div style="display:flex; justify-content:space-between; font-family:'Orbitron';">
                <span>PROGRESS</span><span id="prog-val">0/4</span>
            </div>
            <div class="bar-bg"><div id="prog-fill"></div></div>
        </div>

        <p style="font-size: 22px; margin-bottom: 30px;">Owned Event Currency: <span id="coin-txt" style="color: gold;">0x</span></p>

        <div class="btn-row">
            <button class="av-btn" style="background: #a855f7;" onclick="openModal('shop')">SHOP</button>
            <button class="av-btn" style="background: #22c55e;" onclick="startMatch()">PLAY SESSION</button>
            <button class="av-btn" style="background: #eab308;" onclick="openModal('missions')">MISSIONS</button>
        </div>
    </div>
</div>

<div id="missions-modal" class="modal-overlay">
    <div class="modal-content">
        <h2 style="font-family:'Orbitron';">MISSIONS</h2>
        <div id="mission-list"></div>
        <button class="av-btn" style="background:#333; width:100%; margin-top:20px;" onclick="closeModals()">CLOSE</button>
    </div>
</div>

<div id="shop-modal" class="modal-overlay">
    <div class="modal-content">
        <h2 style="font-family:'Orbitron';">SHOP</h2>
        <p>Items coming in Update 11.5...</p>
        <button class="av-btn" style="background:#333; width:100%;" onclick="closeModals()">CLOSE</button>
    </div>
</div>

<div id="game-screen">
    <div id="game-timer">01:00</div>
    <div id="game-score">SCORE: 000000</div>
    <button class="exit-btn" onclick="endGame()">EXIT SESSION</button>
    <div class="highway" id="highway">
        <div class="lane-key"><span>Q</span><span>W</span><span>E</span><span>R</span><span>T</span></div>
    </div>
</div>

<script>
    // --- DATA SYSTEM ---
    let data = JSON.parse(localStorage.getItem('av_event_save')) || { 
        coins: 0, 
        cleared: [] // Stores 'easy', 'medium', etc.
    };

    function updateUI() {
        document.getElementById('coin-txt').innerText = data.coins + "x";
        document.getElementById('prog-val').innerText = data.cleared.length + "/4";
        document.getElementById('prog-fill').style.width = (data.cleared.length / 4 * 100) + "%";
        localStorage.setItem('av_event_save', JSON.stringify(data));
    }

    // --- MODAL LOGIC ---
    function openModal(id) {
        document.getElementById(id + '-modal').style.display = 'flex';
        if(id === 'missions') {
            const levels = ['EASY', 'MEDIUM', 'HARD', 'EXPERT'];
            document.getElementById('mission-list').innerHTML = levels.map(l => `
                <div style="padding:15px; border-bottom:1px solid #222; display:flex; justify-content:space-between;">
                    <span>Clear ${l}</span>
                    <b>${data.cleared.includes(l.toLowerCase()) ? 'COMPLETED' : 'TO-DO'}</b>
                </div>
            `).join('');
        }
    }
    function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }

    // --- RHYTHM ENGINE ---
    let activeNotes = [];
    let score = 0;
    let gameActive = false;
    let spawnInterval, gameTimer;

    function startMatch() {
        document.getElementById('game-screen').style.display = 'block';
        gameActive = true;
        score = 0;
        activeNotes = [];
        let timeLeft = 60;

        // Note Spawning logic
        spawnInterval = setInterval(() => {
            if(!gameActive) return;
            const lane = Math.floor(Math.random() * 5); // 0 to 4
            const noteEl = document.createElement('div');
            noteEl.className = 'note';
            noteEl.style.left = (lane * 20 + 10) + "%";
            noteEl.style.top = "-50px";
            document.getElementById('highway').appendChild(noteEl);
            
            activeNotes.push({ el: noteEl, y: -50, lane: lane });
        }, 600);

        // Timer logic
        gameTimer = setInterval(() => {
            timeLeft--;
            document.getElementById('game-timer').innerText = `00:${timeLeft < 10 ? '0' : ''}${timeLeft}`;
            if(timeLeft <= 0) endGame(true);
        }, 1000);

        requestAnimationFrame(updateNotes);
    }

    function updateNotes() {
        if(!gameActive) return;
        activeNotes.forEach((note, index) => {
            note.y += 8; // Fall speed
            note.el.style.top = note.y + "px";

            // If note falls past the bottom
            if(note.y > window.innerHeight) {
                note.el.remove();
                activeNotes.splice(index, 1);
            }
        });
        requestAnimationFrame(updateNotes);
    }

    // Key Input Handling
    window.addEventListener('keydown', (e) => {
        if(!gameActive) return;
        const keys = ['q', 'w', 'e', 'r', 't'];
        const laneIndex = keys.indexOf(e.key.toLowerCase());

        if(laneIndex !== -1) {
            // Find note in that lane near the bottom (hit zone: window.innerHeight - 150)
            const hitZone = window.innerHeight - 150;
            const noteToHit = activeNotes.find(n => n.lane === laneIndex && n.y > hitZone - 50 && n.y < hitZone + 50);

            if(noteToHit) {
                score += 100;
                document.getElementById('game-score').innerText = `SCORE: ${score.toString().padStart(6, '0')}`;
                noteToHit.el.remove();
                activeNotes = activeNotes.filter(n => n !== noteToHit);
            }
        }
    });

    function endGame(finished = false) {
        gameActive = false;
        clearInterval(spawnInterval);
        clearInterval(gameTimer);
        
        if(finished) {
            alert("Session Complete! Score: " + score);
            // Example: If score > 2000, clear "Easy"
            if(score > 2000 && !data.cleared.includes('easy')) {
                data.cleared.push('easy');
                data.coins += 15;
            }
        }

        activeNotes.forEach(n => n.el.remove());
        activeNotes = [];
        document.getElementById('game-screen').style.display = 'none';
        updateUI();
    }

    updateUI();
</script>
</body>
</html>
