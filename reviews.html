<script>

let reviews = JSON.parse(localStorage.getItem("abyssReviews")) || []

let adminMode = localStorage.getItem("abyssAdmin") === "true"

function displayReviews(){

let container=document.getElementById("reviews")

container.innerHTML=""

reviews.slice().reverse().forEach((r,index)=>{

container.innerHTML += `

<div class="reviewBox">

<div class="reviewName">${r.name}</div>

<div class="reviewStars">${r.stars}</div>

<div class="reviewText">${r.text}</div>

${adminMode ? `<button onclick="deleteReview(${reviews.length-1-index})">Delete</button>` : ""}

${adminMode ? `<button onclick="editReview(${reviews.length-1-index})">Edit</button>` : ""}

</div>

`

})

}

function postReview(){

let name=document.getElementById("name").value
let stars=document.getElementById("stars").value
let text=document.getElementById("review").value

if(name=="" || text==""){
alert("Fill everything")
return
}

if(text.includes("#ABYSSADMIN")){

adminMode=true
localStorage.setItem("abyssAdmin","true")
alert("Admin mode activated")

}

reviews.push({name,stars,text})

localStorage.setItem("abyssReviews",JSON.stringify(reviews))

document.getElementById("name").value=""
document.getElementById("review").value=""

displayReviews()

}

function deleteReview(i){

reviews.splice(i,1)

localStorage.setItem("abyssReviews",JSON.stringify(reviews))

displayReviews()

}

function editReview(i){

let newText = prompt("Edit review:", reviews[i].text)

if(newText){

reviews[i].text = newText

localStorage.setItem("abyssReviews",JSON.stringify(reviews))

displayReviews()

}

}

displayReviews()

</script>
