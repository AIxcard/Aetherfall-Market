<!DOCTYPE html>
<html>
<head>

<title>Aetherfall Click Game</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#050816;
color:white;
font-family:Arial;
overflow:hidden;
}

header{
text-align:center;
font-size:44px;
padding:18px;
font-family:'Orbitron',sans-serif;
background:linear-gradient(90deg,#38bdf8,#9333ea,#a855f7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

#layout{
display:grid;
grid-template-columns:340px 1fr 340px;
height:calc(100vh - 80px);
}

.panel{
padding:20px;
overflow:auto;
}

.quest{
background:#0f172a;
border-radius:10px;
padding:12px;
margin-bottom:15px;
border:1px solid #1e3a8a;
}

.bar{
height:16px;
background:#1e293b;
border-radius:6px;
overflow:hidden;
}

.fill{
height:100%;
background:#22c55e;
width:0%;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
}

#center{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
position:relative;
}

#sword{
width:260px;
cursor:pointer;
transition:.15s;
}

#sword:hover{
transform:scale(1.06);
filter:drop-shadow(0 0 20px #9333ea);
}

.float{
position:absolute;
pointer-events:none;
font-weight:bold;
animation:floatUp 1s forwards;
}

@keyframes floatUp{
0%{opacity:1;transform:translateY(0)}
100%{opacity:0;transform:translateY(-70px)}
}

button{
background:#9333ea;
border:none;
padding:6px 10px;
border-radius:6px;
color:white;
cursor:pointer;
margin-top:6px;
}

</style>
</head>

<body>

<header>AETHERFALL CLICK GAME</header>

<div id="layout">

<div class="panel">

<h3>Story Quest</h3>

<div class="quest">
Awakening – 100 clicks
<div class="bar"><div id="q1" class="fill"></div></div>
</div>

<div class="quest">
Aether Apprentice – 2000 clicks
<div class="bar"><div id="q2" class="fill"></div></div>
</div>

<div class="quest">
Blade Master – 50000 clicks
<div class="bar"><div id="q3" class="fill"></div></div>
</div>

<div class="quest">
Aether Legend – 1000000 clicks
<div class="bar"><div id="q4" class="fill"></div></div>
</div>

<button onclick="showGuide()">How the Game Works</button>

</div>

<div id="center">

<img id="sword" src="Final_game_icon.png">

<div style="margin-top:15px;text-align:center">

Clicks: <span id="clicks">0</span><br>
Coins: <span id="coins">0</span><br>
Fragments: <span id="fragments">0</span><br>
Combo: <span id="combo">0</span>

</div>

</div>

<div class="panel">

<h3>Permanent Upgrades</h3>

<button onclick="buyUpgrade(8,1)">Sharper Blade (8 Fragments)</button><br>
<button onclick="buyUpgrade(20,2)">Aether Channel (20 Fragments)</button><br>
<button onclick="buyUpgrade(40,3)">Energy Flow (40 Fragments)</button>

<h3 style="margin-top:30px">Coupon Shop</h3>

<button onclick="buyCoupon(300,5)">5 Baht Coupon</button><br>
<button onclick="buyCoupon(700,10)">10 Baht Coupon</button>

</div>

</div>

<script>

let clicks=0
let coins=0
let fragments=0
let combo=0
let lastClick=0
let clickPower=1

let weeklyCoupons=0

const sword=document.getElementById("sword")

sword.onclick=(e)=>{

let now=Date.now()

if(now-lastClick<1300){
combo++
}else{
combo=0
}

lastClick=now

clicks+=clickPower

spawnText(e,"+"+clickPower,"#38bdf8")

if(Math.random()<0.015){
fragments++
spawnText(e,"Fragment","#a855f7")
}

if(combo==5){
coins+=1
spawnText(e,"+1 coin","#22c55e")
}

if(combo==10){
coins+=2
spawnText(e,"+2 coins","#22c55e")
}

if(combo==20){
coins+=3
spawnText(e,"+3 coins","#22c55e")
}

checkStory()

update()

}

function spawnText(e,text,color){

let t=document.createElement("div")
t.className="float"
t.innerText=text
t.style.color=color
t.style.left=e.pageX+"px"
t.style.top=e.pageY+"px"

document.body.appendChild(t)

setTimeout(()=>t.remove(),1000)

}

function checkStory(){

reward(100,"q1",5)
reward(2000,"q2",20)
reward(50000,"q3",100)
reward(1000000,"q4",500)

}

function reward(goal,id,amount){

let bar=document.getElementById(id)

let percent=Math.min(100,(clicks/goal)*100)

bar.style.width=percent+"%"
bar.innerText=Math.floor(percent)+"%"

if(clicks>=goal && !bar.dataset.done){

coins+=amount
bar.dataset.done=true

alert("Quest Complete +"+amount+" coins")

}

}

function buyUpgrade(cost,power){

if(fragments<cost){
alert("Not enough fragments")
return
}

fragments-=cost
clickPower+=power

}

function buyCoupon(cost,val){

if(coins<cost){
alert("Not enough coins")
return
}

if(weeklyCoupons+val>100){
alert("Weekly coupon limit reached")
return
}

coins-=cost

weeklyCoupons+=val

let code="AETHER-"+Math.floor(Math.random()*9000)

let coupons=JSON.parse(localStorage.getItem("abyssCoupons")||"[]")

coupons.push(code+" ("+val+" Baht)")

localStorage.setItem("abyssCoupons",JSON.stringify(coupons))

alert("Coupon Generated: "+code)

}

function showGuide(){

alert(
"Aetherfall Guide\n\nClick the sword to gather Aether energy.\nFragments unlock permanent upgrades.\nCoins buy discount coupons for the market.\nCoupons are limited each week."
)

}

function update(){

document.getElementById("clicks").innerText=clicks
document.getElementById("coins").innerText=coins
document.getElementById("fragments").innerText=fragments
document.getElementById("combo").innerText=combo

save()

}

function save(){

localStorage.setItem("af_clicks",clicks)
localStorage.setItem("af_coins",coins)
localStorage.setItem("af_frag",fragments)

}

function load(){

let c=localStorage.getItem("af_clicks")
let co=localStorage.getItem("af_coins")
let f=localStorage.getItem("af_frag")

if(c)clicks=parseInt(c)
if(co)coins=parseInt(co)
if(f)fragments=parseInt(f)

update()

}

load()

</script>

</body>
</html>
