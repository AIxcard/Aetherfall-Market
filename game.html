<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Aetherfall</title>

<style>

html,body{
margin:0;
height:100%;
overflow:hidden;
background:#050816;
font-family:'Segoe UI',Arial;
color:white;
}

header{
text-align:center;
font-size:40px;
padding:20px;
color:#a78bfa;
font-weight:bold;
letter-spacing:3px;
}

#backBtn{
position:absolute;
left:20px;
top:20px;
background:#0f172a;
border:1px solid #1e3a8a;
padding:8px 14px;
border-radius:8px;
color:white;
cursor:pointer;
}

#levelWrap{
width:520px;
margin:auto;
text-align:center;
}

.bar{
background:#1e293b;
height:20px;
border-radius:8px;
overflow:hidden;
position:relative;
}

.fill{
height:100%;
background:#8b5cf6;
width:0%;
}

.barText{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
font-size:12px;
}

#stats{
display:flex;
justify-content:center;
gap:20px;
margin-top:15px;
}

.stat{
background:#0f172a;
border:1px solid #1e3a8a;
padding:10px 18px;
border-radius:8px;
text-align:center;
}

.coin{color:#facc15}
.fragment{color:#22d3ee}
.combo{color:#f472b6}

#layout{
display:grid;
grid-template-columns:250px 1fr 300px;
height:calc(100vh - 170px);
}

.panel{
padding:20px;
overflow:hidden;
}

#center{
display:flex;
align-items:center;
justify-content:center;
}

#sword{
width:280px;
cursor:pointer;
transition:.1s;
}

#sword:active{
transform:scale(.9);
}

.menuBtn{
background:#0f172a;
border:1px solid #1e3a8a;
padding:18px;
margin-bottom:14px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.menuBtn:hover{
background:#1e293b;
}

.missionBox{
background:#020617;
border:1px solid #2563eb;
padding:14px;
border-radius:10px;
margin-bottom:15px;
}

.modal{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#020617;
border:1px solid #2563eb;
border-radius:10px;
width:900px;
height:650px;
padding:25px;
overflow:auto;
}

.close{
position:absolute;
top:10px;
right:14px;
cursor:pointer;
}

.shopItem{
background:#0f172a;
border:1px solid #1e3a8a;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

button{
margin-top:6px;
padding:6px 12px;
background:#8b5cf6;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.carousel{
display:flex;
align-items:center;
justify-content:center;
gap:20px;
margin-bottom:20px;
}

.card{
width:150px;
height:180px;
background:#0f172a;
border:2px solid #1e3a8a;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
}

.active{
border-color:#facc15;
}

.float{
position:absolute;
pointer-events:none;
font-weight:bold;
animation:floatUp 1s forwards;
}

@keyframes floatUp{
0%{opacity:1;transform:translateY(0)}
100%{opacity:0;transform:translateY(-60px)}
}

</style>
</head>

<body>

<button id="backBtn" onclick="location.href='market.html'">← Market</button>

<header>AETHERFALL</header>

<div id="levelWrap">

<div class="bar">
<div id="levelFill" class="fill"></div>
<span id="levelText" class="barText">LEVEL 1 | 0 / 200 EXP</span>
</div>

</div>

<div id="stats">

<div class="stat">Clicks<br><span id="clicks">0</span></div>
<div class="stat coin">Coins<br><span id="coins">0</span></div>
<div class="stat fragment">Fragments<br><span id="fragments">0</span></div>
<div class="stat combo">Combo<br><span id="combo">0</span></div>

</div>

<div id="layout">

<div class="panel">

<div class="menuBtn" onclick="openModal('lore')">📘 Lore</div>
<div class="menuBtn" onclick="openModal('guide')">❓ Guide</div>
<div class="menuBtn" onclick="openModal('shop')">🛒 Shop</div>
<div class="menuBtn" onclick="openModal('upgrades')">⚡ Upgrades</div>
<div class="menuBtn" onclick="openModal('milestones')">🏆 Milestones</div>

</div>

<div id="center">
<img id="sword" src="Final_game_icon.png">
</div>

<div class="panel">

<div class="missionBox">

<h3>Storyline</h3>
<div id="storyText"></div>

<div class="bar">
<div id="storyFill" class="fill"></div>
<span id="storyPercent" class="barText">0%</span>
</div>

<button onclick="claimStory()">Claim</button>

</div>

<div class="missionBox">

<h3>Daily Mission</h3>

Goal: 2000 clicks  
Reward: 200 coins + 50 EXP

<div class="bar">
<div id="dailyFill" class="fill"></div>
<span id="dailyPercent" class="barText">0%</span>
</div>

<div id="dailyTimer"></div>

<button onclick="claimDaily()">Claim</button>

</div>

</div>

</div>

<!-- LORE -->

<div id="lore" class="modal">
<span class="close" onclick="closeModal('lore')">X</span>
