<!DOCTYPE html>

<html>

<head>

<title>Aetherfall Market</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
transition:background 0.6s;
}

/* BACKGROUNDS */

body.bg1{
background:linear-gradient(160deg,#020617,#1e3a8a);
}

body.bg2{
background:linear-gradient(160deg,#020617,#4c1d95);
}

body.bg3{
background:linear-gradient(160deg,#020617,#134e4a);
}

/* HEADER */

.header{

text-align:center;

font-size:55px;

margin-top:30px;

background:linear-gradient(90deg,#38bdf8,#6366f1,#9333ea);

-webkit-background-clip:text;

color:transparent;

}

/* SETTINGS */

.settings{

position:fixed;

top:20px;

right:20px;

background:#0f172a;

padding:15px;

border-radius:10px;

border:1px solid #1e3a8a;

}

.settings button{

margin-top:5px;

width:100%;

}

/* CATEGORY */

.categoryGrid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:30px;

max-width:900px;

margin:50px auto;

}

.card{

background:#0f172a;

padding:40px;

text-align:center;

border-radius:15px;

cursor:pointer;

border:1px solid #1e3a8a;

transition:.3s;

}

.card:hover{

transform:scale(1.08);

box-shadow:0 0 25px #2563eb;

}

/* LISTS */

.list{

max-width:900px;

margin:30px auto;

display:none;

}

.entry{

background:#0f172a;

padding:15px;

margin-top:10px;

border-radius:10px;

cursor:pointer;

border:1px solid #1e3a8a;

transition:.2s;

}

.entry:hover{

border-color:#38bdf8;

transform:scale(1.04);

}

/* DETAIL BOX */

.detail{

max-width:500px;

margin:40px auto;

background:#0f172a;

padding:25px;

border-radius:15px;

border:1px solid #38bdf8;

display:none;

}

</style>

</head>
