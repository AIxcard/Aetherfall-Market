<!DOCTYPE html>
<html>
<head>
    <title>Login / Sign Up</title>
    <script type="module">
      // I will give you the Config code for this section in the next step!
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

      // Your web app's Firebase configuration (Paste yours here later)
      const firebaseConfig = { 
          apiKey: "YOUR_API_KEY",
          authDomain: "YOUR_PROJECT.firebaseapp.com",
          projectId: "YOUR_PROJECT_ID",
          storageBucket: "YOUR_PROJECT.appspot.com",
          messagingSenderId: "ID",
          appId: "APP_ID"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth();

      // Sign Up Function
      window.signUp = () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        createUserWithEmailAndPassword(auth, email, pass)
          .then(() => { alert("Account Created!"); window.location.href="market.html"; })
          .catch((error) => alert(error.message));
      };

      // Login Function
      window.login = () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        signInWithEmailAndPassword(auth, email, pass)
          .then(() => { window.location.href="market.html"; })
          .catch((error) => alert(error.message));
      };
    </script>
</head>
<body style="background:#0d1117; color:white; font-family:sans-serif; text-align:center;">
    <h2>Account Access</h2>
    <input type="email" id="email" placeholder="Email"><br><br>
    <input type="password" id="pass" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
    <button onclick="signUp()">Sign Up</button>
</body>
</html>
